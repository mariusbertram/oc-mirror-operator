    containerImage: quay.lab.brtrm.dev/marius/oc-mirror-operator@sha256:1ba9d91cb296f627aee3c0ee3f04c8ab7b337ffec94afa17596e4624c8bad483
    createdAt: "2026-04-22T19:28:47Z"
    operators.operatorframework.io/builder: operator-sdk-v1.42.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/mariusbertram/oc-mirror-operator
    support: Marius Bertram
  name: oc-mirror.v0.0.2
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
      - description: |
          An ImageSet describes the desired content (release channels, operator
          catalogs, additional images) to mirror to one or more MirrorTargets.
        displayName: Image Set
        kind: ImageSet
        name: imagesets.mirror.openshift.io
        version: v1alpha1
      - description: |
          A MirrorTarget defines a destination registry for one or more ImageSets.
          It owns the manager Deployment that orchestrates per-image worker pods
          and exposes aggregated mirroring progress (Total/Mirrored/Pending/Failed).
        displayName: Mirror Target
        kind: MirrorTarget
        name: mirrortargets.mirror.openshift.io
        version: v1alpha1
  description: |
    The oc-mirror operator brings the functionality of the upstream `oc-mirror`
    plugin to Kubernetes/OpenShift as a fully declarative, in-cluster operator.

    ## Features

    - **Declarative content selection** via `ImageSet` CRs (release channels,
      operator catalogs, additional images, helm charts).
    - **Per-target mirroring** via `MirrorTarget` CRs that aggregate one or
      more ImageSets into a destination registry.
    - **Live progress aggregation**: TOTAL/MIRRORED/PENDING/FAILED columns on
      `oc get mirrortarget`.
    - **Filtered FBC catalog images** built in-cluster from upstream operator
      indexes.
    - **Live skip of obsolete images** when ImageSets are reduced while a
      mirror run is in flight.
    - **Resource server** that publishes IDMS/ITMS/CatalogSource/ClusterCatalog
      manifests once an ImageSet is Ready.

    See https://github.com/mariusbertram/oc-mirror-operator for the full
    architecture, security model, and deployment guide.
