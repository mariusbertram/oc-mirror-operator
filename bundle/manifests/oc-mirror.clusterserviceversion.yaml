                        value: quay.lab.brtrm.dev/marius/oc-mirror-operator@sha256:1ba9d91cb296f627aee3c0ee3f04c8ab7b337ffec94afa17596e4624c8bad483
                    image: quay.lab.brtrm.dev/marius/oc-mirror-operator@sha256:1ba9d91cb296f627aee3c0ee3f04c8ab7b337ffec94afa17596e4624c8bad483
                    livenessProbe:
