resources:
- manager.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
images:
- name: controller
  newName: 192.168.1.14:5001/oc-mirror-operator
  newTag: latest

# Mirror the manager container image into OPERATOR_IMAGE so the env var
# follows whatever `make bundle IMG=...` (or the OLM ClusterServiceVersion)
# resolves the image to. Without this, OPERATOR_IMAGE would stay at the
# placeholder "controller:latest" and the operator would fail-fast at boot.
replacements:
- source:
    fieldPath: spec.template.spec.containers.[name=manager].image
    kind: Deployment
    name: controller-manager
  targets:
  - fieldPaths:
    - spec.template.spec.containers.[name=manager].env.[name=OPERATOR_IMAGE].value
    select:
      kind: Deployment
      name: controller-manager
