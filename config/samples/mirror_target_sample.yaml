apiVersion: mirror.openshift.io/v1alpha1
kind: MirrorTarget
metadata:
  name: internal-registry
spec:
  # The URL of your internal registry mirror
  registry: registry.default.svc.cluster.local:5000/mirror
  
  # Optional: reference to a secret with credentials
  # authSecret: internal-registry-credentials
  
  # Set to true for self-signed certificates
  insecure: true
