apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
      - name: registry
        image: docker.io/library/registry:2
        ports:
        - containerPort: 5000
        env:
        - name: REGISTRY_HTTP_ADDR
          value: :5000
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: default
spec:
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: registry
