# These resources constitute the fully configured set of manifests
# used to generate the 'manifests/' directory in a bundle.
resources:
- bases/oc-mirror.clusterserviceversion.yaml
- ../default
- ../samples
- ../scorecard

configurations:
- kustomizeconfig.yaml

replacements:
- source:
    kind: Deployment
    name: controller-manager
    fieldPath: spec.template.metadata.annotations.oc-mirror-manager-image
  targets:
  - select:
      kind: ClusterServiceVersion
    fieldPaths:
    - spec.relatedImages.[name=manager].image
    - metadata.annotations.oc-mirror-manager-image
    - spec.install.spec.deployments.[name=controller-manager].spec.template.spec.containers.[name=manager].env.[name=MANAGER_IMAGE].value
- source:
    kind: Deployment
    name: controller-manager
    fieldPath: spec.template.metadata.annotations.oc-mirror-worker-image
  targets:
  - select:
      kind: ClusterServiceVersion
    fieldPaths:
    - spec.relatedImages.[name=worker].image
    - metadata.annotations.oc-mirror-worker-image
    - spec.install.spec.deployments.[name=controller-manager].spec.template.spec.containers.[name=manager].env.[name=WORKER_IMAGE].value
- source:
    kind: Deployment
    name: controller-manager
    fieldPath: spec.template.spec.containers.[name=manager].image
  targets:
  - select:
      kind: ClusterServiceVersion
    fieldPaths:
    - spec.install.spec.deployments.[name=controller-manager].spec.template.spec.containers.[name=manager].image
    - metadata.annotations.containerImage

