apiVersion: v1
kind: ConfigMap
metadata:
  name: oc-mirror-grafana-dashboard
  namespace: system
  labels:
    app.kubernetes.io/name: oc-mirror
    app.kubernetes.io/managed-by: kustomize
    grafana_dashboard: "1"
    console.openshift.io/dashboard: "true"
data:
  oc-mirror-dashboard.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "title": "OC Mirror Operator",
      "uid": "oc-mirror-operator",
      "tags": ["oc-mirror", "openshift", "mirroring"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Overview",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Images",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 1},
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum(oc_mirror_mirrortarget_images_total)",
              "legendFormat": "Total"
            }
          ],
          "options": {"colorMode": "value", "graphMode": "area"}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Mirrored Images",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 1},
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum(oc_mirror_mirrortarget_images_mirrored)",
              "legendFormat": "Mirrored"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "color": {"mode": "thresholds"},
            "thresholds": {"steps": [{"color": "green", "value": null}]}
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Pending Images",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 1},
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum(oc_mirror_mirrortarget_images_pending)",
              "legendFormat": "Pending"
            }
          ],
          "options": {
            "colorMode": "value",
            "color": {"mode": "thresholds"},
            "thresholds": {"steps": [{"color": "blue", "value": null}]}
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Failed Images",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 1},
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum(oc_mirror_mirrortarget_images_failed)",
              "legendFormat": "Failed"
            }
          ],
          "options": {
            "colorMode": "value",
            "color": {"mode": "thresholds"},
            "thresholds": {
              "steps": [
                {"color": "green", "value": null},
                {"color": "yellow", "value": 1},
                {"color": "red", "value": 10}
              ]
            }
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "Mirroring Throughput",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Images Mirrored per Minute",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum by (target) (rate(oc_mirror_manager_images_mirrored_total[5m])) * 60",
              "legendFormat": "{{target}}"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Image Failure Rate",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum by (target) (rate(oc_mirror_manager_images_failed_total[5m])) * 60",
              "legendFormat": "{{target}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"lineStyle": {"fill": "solid"}}
            }
          }
        },
        {
          "id": 9,
          "type": "row",
          "title": "Per-Target Details",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 14}
        },
        {
          "id": 10,
          "type": "table",
          "title": "MirrorTarget Status",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 15},
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "oc_mirror_mirrortarget_images_total",
              "legendFormat": "{{namespace}}/{{target}}",
              "instant": true
            },
            {
              "expr": "oc_mirror_mirrortarget_images_mirrored",
              "legendFormat": "{{namespace}}/{{target}}",
              "instant": true
            },
            {
              "expr": "oc_mirror_mirrortarget_images_pending",
              "legendFormat": "{{namespace}}/{{target}}",
              "instant": true
            },
            {
              "expr": "oc_mirror_mirrortarget_images_failed",
              "legendFormat": "{{namespace}}/{{target}}",
              "instant": true
            }
          ],
          "transformations": [
            {"id": "merge", "options": {}},
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "Value #A": "Total",
                  "Value #B": "Mirrored",
                  "Value #C": "Pending",
                  "Value #D": "Failed"
                }
              }
            }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Active Worker Pods",
          "gridPos": {"h": 6, "w": 12, "x": 0, "y": 23},
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "oc_mirror_manager_active_workers",
              "legendFormat": "{{target}}"
            }
          ]
        },
        {
          "id": 12,
          "type": "heatmap",
          "title": "Batch Duration (seconds)",
          "gridPos": {"h": 6, "w": 12, "x": 12, "y": 23},
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "expr": "sum(rate(oc_mirror_manager_batch_duration_seconds_bucket[5m])) by (le)",
              "legendFormat": "{{le}}"
            }
          ]
        },
        {
          "id": 13,
          "type": "row",
          "title": "Alerts",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 29}
        },
        {
          "id": 14,
          "type": "alertlist",
          "title": "Active Alerts",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 30},
          "options": {
            "alertName": "OCMirror",
            "dashboardAlerts": false,
            "groupMode": "default",
            "maxItems": 20,
            "sortOrder": 1,
            "stateFilter": {"firing": true, "pending": true}
          }
        }
      ]
    }
