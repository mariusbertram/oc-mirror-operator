apiVersion: v1
data:
  oc-mirror-dashboard.json: "{\n  \"__inputs\": [\n    {\n      \"name\": \"DS_PROMETHEUS\",\n      \"label\": \"Prometheus\",\n      \"description\": \"\",\n      \"type\": \"datasource\",\n      \"pluginId\": \"prometheus\",\n      \"pluginName\": \"Prometheus\"\n    }\n  ],\n  \"title\": \"OC Mirror Operator\",\n  \"uid\": \"oc-mirror-operator\",\n  \"tags\": [\n    \"oc-mirror\",\n    \"openshift\",\n    \"mirroring\"\n  ],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"30s\",\n  \"panels\": [\n    {\n      \"id\": 1,\n      \"type\": \"row\",\n      \"title\": \"Overview\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      }\n    },\n    {\n      \"id\": 2,\n      \"type\": \"stat\",\n      \"title\": \"Total Images\",\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 6,\n        \"x\": 0,\n        \"y\": 1\n      },\n      \"datasource\": \"${DS_PROMETHEUS}\",\n      \"targets\": [\n        {\n          \"expr\": \"sum(oc_mirror_mirrortarget_images_total)\",\n          \"legendFormat\": \"Total\"\n        }\n      ],\n      \"options\": {\n        \"colorMode\": \"value\",\n        \"graphMode\": \"area\"\n      }\n    },\n    {\n      \"id\": 3,\n      \"type\": \"stat\",\n      \"title\": \"Mirrored Images\",\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 6,\n        \"x\": 6,\n        \"y\": 1\n      },\n      \"datasource\": \"${DS_PROMETHEUS}\",\n      \"targets\": [\n        {\n          \"expr\": \"sum(oc_mirror_mirrortarget_images_mirrored)\",\n          \"legendFormat\": \"Mirrored\"\n        }\n      ],\n      \"options\": {\n        \"colorMode\": \"value\",\n        \"graphMode\": \"area\",\n        \"color\": {\n          \"mode\": \"thresholds\"\n        },\n        \"thresholds\": {\n          \"steps\": [\n            {\n              \"color\": \"green\",\n              \"value\": null\n            }\n          ]\n        }\n      }\n    },\n    {\n      \"id\": 4,\n      \"type\": \"stat\",\n      \"title\": \"Pending Images\",\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 6,\n        \"x\": 12,\n        \"y\": 1\n      },\n      \"datasource\": \"${DS_PROMETHEUS}\",\n      \"targets\": [\n        {\n          \"expr\": \"sum(oc_mirror_mirrortarget_images_pending)\",\n          \"legendFormat\": \"Pending\"\n        }\n      ],\n      \"options\": {\n        \"colorMode\": \"value\",\n        \"color\": {\n          \"mode\": \"thresholds\"\n        },\n        \"thresholds\": {\n          \"steps\": [\n            {\n              \"color\": \"blue\",\n              \"value\": null\n            }\n          ]\n        }\n      }\n    },\n    {\n      \"id\": 5,\n      \"type\": \"stat\",\n      \"title\": \"Failed Images\",\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 6,\n        \"x\": 18,\n        \"y\": 1\n      },\n      \"datasource\": \"${DS_PROMETHEUS}\",\n      \"targets\": [\n        {\n          \"expr\": \"sum(oc_mirror_mirrortarget_images_failed)\",\n          \"legendFormat\": \"Failed\"\n        }\n      ],\n      \"options\": {\n        \"colorMode\": \"value\",\n        \"color\": {\n          \"mode\": \"thresholds\"\n        },\n        \"thresholds\": {\n          \"steps\": [\n            {\n              \"color\": \"green\",\n              \"value\": null\n            },\n            {\n              \"color\": \"yellow\",\n              \"value\": 1\n            },\n            {\n              \"color\": \"red\",\n              \"value\": 10\n            }\n          ]\n        }\n      }\n    },\n    {\n      \"id\": 6,\n      \"type\": \"row\",\n      \"title\": \"Mirroring Throughput\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 5\n      }\n    },\n    {\n      \"id\": 7,\n      \"type\": \"timeseries\",\n      \"title\": \"Images Mirrored per Minute\",\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\": 6\n      },\n      \"datasource\": \"${DS_PROMETHEUS}\",\n      \"targets\": [\n        {\n          \"expr\": \"sum by (target) (rate(oc_mirror_manager_images_mirrored_total[5m])) * 60\",\n          \"legendFormat\": \"{{target}}\"\n        }\n      ]\n    },\n    {\n      \"id\": 8,\n      \"type\": \"timeseries\",\n      \"title\": \"Image Failure Rate\",\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 6\n      },\n      \"datasource\": \"${DS_PROMETHEUS}\",\n      \"targets\": [\n        {\n          \"expr\": \"sum by (target) (rate(oc_mirror_manager_images_failed_total[5m])) * 60\",\n          \"legendFormat\": \"{{target}}\"\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"palette-classic\"\n          },\n          \"custom\": {\n            \"lineStyle\": {\n              \"fill\": \"solid\"\n            }\n          }\n        }\n      }\n    },\n    {\n      \"id\": 9,\n      \"type\": \"row\",\n      \"title\": \"Per-Target Details\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 14\n      }\n    },\n    {\n      \"id\": 10,\n      \"type\": \"table\",\n      \"title\": \"MirrorTarget Status\",\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 15\n      },\n      \"datasource\": \"${DS_PROMETHEUS}\",\n      \"targets\": [\n        {\n          \"expr\": \"oc_mirror_mirrortarget_images_total\",\n          \"legendFormat\": \"{{namespace}}/{{target}}\",\n          \"instant\": true\n        },\n        {\n          \"expr\": \"oc_mirror_mirrortarget_images_mirrored\",\n          \"legendFormat\": \"{{namespace}}/{{target}}\",\n          \"instant\": true\n        },\n        {\n          \"expr\": \"oc_mirror_mirrortarget_images_pending\",\n          \"legendFormat\": \"{{namespace}}/{{target}}\",\n          \"instant\": true\n        },\n        {\n          \"expr\": \"oc_mirror_mirrortarget_images_failed\",\n          \"legendFormat\": \"{{namespace}}/{{target}}\",\n          \"instant\": true\n        }\n      ],\n      \"columns\": [\n        {\n          \"text\": \"Namespace\",\n          \"value\": \"namespace\"\n        },\n        {\n          \"text\": \"Target\",\n          \"value\": \"target\"\n        },\n        {\n          \"text\": \"Total\",\n          \"value\": \"Value #A\"\n        },\n        {\n          \"text\": \"Mirrored\",\n          \"value\": \"Value #B\"\n        },\n        {\n          \"text\": \"Pending\",\n          \"value\": \"Value #C\"\n        },\n        {\n          \"text\": \"Failed\",\n          \"value\": \"Value #D\"\n        }\n      ],\n      \"styles\": [\n        {\n          \"alias\": \"Time\",\n          \"colorMode\": null,\n          \"colors\": [],\n          \"dateFormat\": \"YYYY-MM-DD HH:mm:ss\",\n          \"decimals\": 2,\n          \"link\": false,\n          \"linkTooltip\": \"Drill down\",\n          \"linkUrl\": \"\",\n          \"pattern\": \"Time\",\n          \"thresholds\": [],\n          \"type\": \"hidden\",\n          \"unit\": \"short\"\n        },\n        {\n          \"alias\": \"Namespace\",\n          \"colorMode\": null,\n          \"colors\": [],\n          \"dateFormat\": \"YYYY-MM-DD HH:mm:ss\",\n          \"decimals\": 2,\n          \"link\": false,\n          \"linkTooltip\": \"Drill down\",\n          \"linkUrl\": \"\",\n          \"pattern\": \"namespace\",\n          \"thresholds\": [],\n          \"type\": \"string\",\n          \"unit\": \"short\"\n        },\n        {\n          \"alias\": \"Target\",\n          \"colorMode\": null,\n          \"colors\": [],\n          \"dateFormat\": \"YYYY-MM-DD HH:mm:ss\",\n          \"decimals\": 2,\n          \"link\": false,\n          \"linkTooltip\": \"Drill down\",\n          \"linkUrl\": \"\",\n          \"pattern\": \"target\",\n          \"thresholds\": [],\n          \"type\": \"string\",\n          \"unit\": \"short\"\n        },\n        {\n          \"alias\": \"Total\",\n          \"colorMode\": null,\n          \"colors\": [],\n          \"dateFormat\": \"YYYY-MM-DD HH:mm:ss\",\n          \"decimals\": 0,\n          \"link\": false,\n          \"linkTooltip\": \"Drill down\",\n          \"linkUrl\": \"\",\n          \"pattern\": \"Value #A\",\n          \"thresholds\": [],\n          \"type\": \"number\",\n          \"unit\": \"short\"\n        },\n        {\n          \"alias\": \"Mirrored\",\n          \"colorMode\": null,\n          \"colors\": [],\n          \"dateFormat\": \"YYYY-MM-DD HH:mm:ss\",\n          \"decimals\": 0,\n          \"link\": false,\n          \"linkTooltip\": \"Drill down\",\n          \"linkUrl\": \"\",\n          \"pattern\": \"Value #B\",\n          \"thresholds\": [],\n          \"type\": \"number\",\n          \"unit\": \"short\"\n        },\n        {\n          \"alias\": \"Pending\",\n          \"colorMode\": null,\n          \"colors\": [],\n          \"dateFormat\": \"YYYY-MM-DD HH:mm:ss\",\n          \"decimals\": 0,\n          \"link\": false,\n          \"linkTooltip\": \"Drill down\",\n          \"linkUrl\": \"\",\n          \"pattern\": \"Value #C\",\n          \"thresholds\": [],\n          \"type\": \"number\",\n          \"unit\": \"short\"\n        },\n        {\n          \"alias\": \"Failed\",\n          \"colorMode\": \"cell\",\n          \"colors\": [\n            \"rgba(50, 172, 45, 0.97)\",\n            \"rgba(237, 129, 40, 0.89)\",\n            \"rgba(245, 54, 54, 0.9)\"\n          ],\n          \"dateFormat\": \"YYYY-MM-DD HH:mm:ss\",\n          \"decimals\": 0,\n          \"link\": false,\n          \"linkTooltip\": \"Drill down\",\n          \"linkUrl\": \"\",\n          \"pattern\": \"Value #D\",\n          \"thresholds\": [\n            \"1\",\n            \"10\"\n          ],\n          \"type\": \"number\"\
    ,\n          \"unit\": \"short\"\n        }\n      ],\n      \"fill\": 1,\n      \"fontSize\": \"100%\",\n      \"lines\": true,\n      \"linewidth\": 1,\n      \"links\": [],\n      \"nullPointMode\": \"null as zero\",\n      \"renderer\": \"flot\",\n      \"scroll\": true,\n      \"showHeader\": true,\n      \"sort\": {\n        \"col\": 0,\n        \"desc\": false\n      },\n      \"spaceLength\": 10,\n      \"timeFrom\": null,\n      \"timeShift\": null\n    },\n    {\n      \"id\": 11,\n      \"type\": \"timeseries\",\n      \"title\": \"Active Worker Pods\",\n      \"gridPos\": {\n        \"h\": 6,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\": 23\n      },\n      \"datasource\": \"${DS_PROMETHEUS}\",\n      \"targets\": [\n        {\n          \"expr\": \"oc_mirror_manager_active_workers\",\n          \"legendFormat\": \"{{target}}\"\n        }\n      ]\n    },\n    {\n      \"id\": 12,\n      \"type\": \"heatmap\",\n      \"title\": \"Batch Duration (seconds)\",\n      \"gridPos\": {\n        \"h\": 6,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 23\n      },\n      \"datasource\": \"${DS_PROMETHEUS}\",\n      \"targets\": [\n        {\n          \"expr\": \"sum(rate(oc_mirror_manager_batch_duration_seconds_bucket[5m])) by (le)\",\n          \"legendFormat\": \"{{le}}\"\n        }\n      ]\n    },\n    {\n      \"id\": 13,\n      \"type\": \"row\",\n      \"title\": \"Alerts\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 29\n      }\n    },\n    {\n      \"id\": 14,\n      \"type\": \"alertlist\",\n      \"title\": \"Active Alerts\",\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 30\n      },\n      \"options\": {\n        \"alertName\": \"OCMirror\",\n        \"dashboardAlerts\": false,\n        \"groupMode\": \"default\",\n        \"maxItems\": 20,\n        \"sortOrder\": 1,\n        \"stateFilter\": {\n          \"firing\": true,\n          \"pending\": true\n        }\n      }\n    }\n  ]\n}"
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: oc-mirror
    console.openshift.io/dashboard: 'true'
    grafana_dashboard: '1'
  name: grafana-dashboard
  namespace: system
