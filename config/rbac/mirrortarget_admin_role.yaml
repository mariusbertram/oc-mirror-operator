# This rule is not used by the project ocp-mirror itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over mirror.mirror.openshift.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ocp-mirror
    app.kubernetes.io/managed-by: kustomize
  name: mirrortarget-admin-role
rules:
- apiGroups:
  - mirror.mirror.openshift.io
  resources:
  - mirrortargets
  verbs:
  - '*'
- apiGroups:
  - mirror.mirror.openshift.io
  resources:
  - mirrortargets/status
  verbs:
  - get
