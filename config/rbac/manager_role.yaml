---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oc-mirror-manager
  namespace: system
  labels:
    app.kubernetes.io/name: oc-mirror
    app.kubernetes.io/component: manager
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oc-mirror-manager-role
  namespace: system
  labels:
    app.kubernetes.io/name: oc-mirror
    app.kubernetes.io/component: manager
    app.kubernetes.io/managed-by: kustomize
rules:
# Pod management (create/delete worker pods)
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - watch
# ConfigMap access (imagestate, worker coordination)
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
# Secret access (registry credentials)
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oc-mirror-manager-rolebinding
  namespace: system
  labels:
    app.kubernetes.io/name: oc-mirror
    app.kubernetes.io/component: manager
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oc-mirror-manager-role
subjects:
- kind: ServiceAccount
  name: oc-mirror-manager
  namespace: system
