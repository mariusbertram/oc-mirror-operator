# This rule is not used by the project ocp-mirror itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the mirror.mirror.openshift.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ocp-mirror
    app.kubernetes.io/managed-by: kustomize
  name: mirrortarget-editor-role
rules:
- apiGroups:
  - mirror.mirror.openshift.io
  resources:
  - mirrortargets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mirror.mirror.openshift.io
  resources:
  - mirrortargets/status
  verbs:
  - get
