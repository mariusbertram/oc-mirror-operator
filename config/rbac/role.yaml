---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mirror.openshift.io
  resources:
  - imagesets
  - mirrortargets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mirror.openshift.io
  resources:
  - imagesets/finalizers
  - mirrortargets/finalizers
  verbs:
  - update
- apiGroups:
  - mirror.openshift.io
  resources:
  - imagesets/status
  - mirrortargets/status
  verbs:
  - get
  - patch
  - update
