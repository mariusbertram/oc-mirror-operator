---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mirror.openshift.io
  resources:
  - imagesets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mirror.openshift.io
  resources:
  - imagesets/finalizers
  verbs:
  - update
- apiGroups:
  - mirror.openshift.io
  resources:
  - imagesets/status
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mirror.openshift.io
  resources:
  - mirrortargets
  verbs:
  - get
  - list
  - watch
