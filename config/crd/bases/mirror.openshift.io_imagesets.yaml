---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: imagesets.mirror.openshift.io
spec:
  group: mirror.openshift.io
  names:
    kind: ImageSet
    listKind: ImageSetList
    plural: imagesets
    singular: imageset
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ImageSet is the Schema for the imagesets API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ImageSetSpec defines the desired state of ImageSet
            properties:
              mirror:
                description: |-
                  Mirror defines the configuration for content types within the imageset.
                  This matches the ImageSetConfiguration of oc-mirror.
                  The ImageSet is associated with a MirrorTarget via the MirrorTarget's
                  spec.imageSets list — the ImageSet itself does not reference a target.
                properties:
                  additionalImages:
                    description: |-
                      AdditionalImages defines the configuration for a list
                      of individual image content types.
                    items:
                      description: AdditionalImage contains image pull information
                        for additional images.
                      properties:
                        name:
                          description: Name of the image.
                          type: string
                        targetRepo:
                          description: TargetRepo replaces the repository path.
                          type: string
                        targetTag:
                          description: TargetTag is the tag the image will be mirrored
                            with.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  blockedImages:
                    description: |-
                      BlockedImages define a list of images that will be blocked
                      from the mirroring process if they exist in other content
                      types in the configuration.
                    items:
                      description: BlockedImage contains image information used for
                        excluding images.
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  helm:
                    description: Helm define the configuration for Helm content types.
                    properties:
                      local:
                        description: Local is the configuration for locally stored
                          helm charts.
                        items:
                          description: Chart is the information an individual Helm
                            chart.
                          properties:
                            imagePaths:
                              description: ImagePaths are custom JSON paths for images
                                location.
                              items:
                                type: string
                              type: array
                            name:
                              description: Name is the chart name.
                              type: string
                            path:
                              description: Path defines the path on disk where the
                                chart is stored.
                              type: string
                            version:
                              description: Version is the chart version.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                      repositories:
                        description: Repositories are the Helm repositories containing
                          the charts.
                        items:
                          description: Repository defines the configuration for a
                            Helm repository.
                          properties:
                            charts:
                              description: Charts is a list of charts to pull from
                                the repo.
                              items:
                                description: Chart is the information an individual
                                  Helm chart.
                                properties:
                                  imagePaths:
                                    description: ImagePaths are custom JSON paths
                                      for images location.
                                    items:
                                      type: string
                                    type: array
                                  name:
                                    description: Name is the chart name.
                                    type: string
                                  path:
                                    description: Path defines the path on disk where
                                      the chart is stored.
                                    type: string
                                  version:
                                    description: Version is the chart version.
                                    type: string
                                required:
                                - name
                                type: object
                              type: array
                            name:
                              description: Name is the name of the Helm repository.
                              type: string
                            url:
                              description: URL is the url of the Helm repository.
                              type: string
                          required:
                          - charts
                          - name
                          - url
                          type: object
                        type: array
                    type: object
                  operators:
                    description: Operators defines the configuration for Operator
                      content types.
                    items:
                      description: Operator defines the configuration for operator
                        catalog mirroring.
                      properties:
                        catalog:
                          description: Catalog image to mirror.
                          type: string
                        full:
                          description: Full defines whether all packages within the
                            catalog will be mirrored.
                          type: boolean
                        packages:
                          description: Packages to include.
                          items:
                            description: IncludePackage contains a name (required)
                              and channels and/or versions (optional).
                            properties:
                              channels:
                                description: Channels to include.
                                items:
                                  description: IncludeChannel contains a name (required)
                                    and versions (optional).
                                  properties:
                                    maxVersion:
                                      description: MaxVersion to include.
                                      type: string
                                    minVersion:
                                      description: MinVersion to include.
                                      type: string
                                    name:
                                      description: Name of channel.
                                      type: string
                                  required:
                                  - name
                                  type: object
                                type: array
                              defaultChannel:
                                type: string
                              maxVersion:
                                description: MaxVersion to include.
                                type: string
                              minVersion:
                                description: MinVersion to include.
                                type: string
                              name:
                                description: Name of package.
                                type: string
                            required:
                            - name
                            type: object
                          type: array
                        skipDependencies:
                          description: SkipDependencies will not include dependencies
                            if true.
                          type: boolean
                        targetCatalog:
                          description: TargetCatalog replaces TargetName and allows
                            for specifying the exact URL of the target catalog.
                          type: string
                        targetTag:
                          description: TargetTag is the tag the catalog image will
                            be built with.
                          type: string
                      required:
                      - catalog
                      type: object
                    type: array
                  platform:
                    description: Platform defines the configuration for OpenShift
                      and OKD platform types.
                    properties:
                      architectures:
                        description: |-
                          Architectures defines one or more architectures
                          to mirror for the release image. This is defined at the
                          platform level to enable cross-channel upgrades.
                        items:
                          type: string
                        type: array
                      channels:
                        description: |-
                          Channels defines the configuration for individual
                          OCP and OKD channels
                        items:
                          description: |-
                            ReleaseChannel defines the configuration for individual
                            OCP and OKD channels
                          properties:
                            full:
                              description: |-
                                Full mode set the MinVersion to the
                                first release in the channel and the MaxVersion
                                to the last release in the channel.
                              type: boolean
                            maxVersion:
                              description: |-
                                MaxVersion is maximum version in the
                                release channel to mirror
                              type: string
                            minVersion:
                              description: |-
                                MinVersion is minimum version in the
                                release channel to mirror
                              type: string
                            name:
                              type: string
                            shortestPath:
                              description: |-
                                ShortestPath mode calculates the shortest path
                                between the min and mav version
                              type: boolean
                            type:
                              default: ocp
                              description: |-
                                Type of the platform in the context of this tool.
                                OCP is the default.
                              enum:
                              - ocp
                              - okd
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                      graph:
                        description: |-
                          Graph defines whether Cincinnati graph data will
                          downloaded and publish
                        type: boolean
                      kubeVirtContainer:
                        description: |-
                          The kubeVirtContainer flag when set to true (default false)
                          will be used to extract the kubeVirtContainer image
                          from the release payload file 0000_50_installer_coreos-bootimages
                        type: boolean
                      release:
                        description: |-
                          This new field will allow the diskToMirror functionality
                          to copy from a release location on disk
                        type: string
                    type: object
                  samples:
                    description: |-
                      Samples defines the configuration for Sample content types.
                      This is currently not implemented.
                    items:
                      description: SampleImage defines the configuration for Sample
                        content types.
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                type: object
            required:
            - mirror
            type: object
          status:
            description: ImageSetStatus defines the observed state of ImageSet
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of an object's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failedImageDetails:
                description: |-
                  FailedImageDetails lists the images that failed mirroring with their error
                  and the spec entry that referenced them. Capped at 20 entries to bound
                  status size; the FailedImages counter always reflects the full count.
                items:
                  description: FailedImageDetail describes a single image that could
                    not be mirrored.
                  properties:
                    destination:
                      description: Destination is the mirroring target reference.
                      type: string
                    error:
                      description: Error is the last error message from the mirroring
                        attempt.
                      type: string
                    origin:
                      description: |-
                        Origin is a human-readable description of which spec entry produced
                        this image (e.g. "registry.../redhat-operator-index:v4.21 [web-terminal]"
                        or "stable-4.14 [amd64]").
                      type: string
                    source:
                      description: Source is the upstream image reference.
                      type: string
                  required:
                  - destination
                  - source
                  type: object
                type: array
              failedImages:
                description: FailedImages is the number of images that failed mirroring
                  (exhausted retries).
                type: integer
              lastSuccessfulPollTime:
                description: |-
                  LastSuccessfulPollTime is the timestamp of the last successful upstream poll.
                  Used together with MirrorTarget.spec.pollInterval to schedule periodic re-collection.
                format: date-time
                type: string
              mirroredImages:
                description: MirroredImages is the number of images successfully mirrored.
                type: integer
              observedGeneration:
                description: ObservedGeneration is the generation of the ImageSet
                  that was last reconciled.
                format: int64
                type: integer
              pendingImages:
                description: PendingImages is the number of images waiting to be mirrored
                  or in progress.
                type: integer
              totalImages:
                description: TotalImages is the total number of images to be mirrored.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
