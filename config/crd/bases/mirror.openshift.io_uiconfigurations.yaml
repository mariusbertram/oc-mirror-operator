---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: uiconfigurations.mirror.openshift.io
spec:
  group: mirror.openshift.io
  names:
    kind: UIConfiguration
    listKind: UIConfigurationList
    plural: uiconfigurations
    shortNames:
    - uic
    singular: uiconfiguration
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.exposureType
      name: Exposure Type
      type: string
    - jsonPath: .status.exposedURL
      name: Exposed URL
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          UIConfiguration is the Schema for the uiconfigurations API.
          UIConfiguration is namespace-scoped and controls how the oc-mirror UI dashboard is exposed
          and configured (via Service, Ingress, Route, or OpenShift Console Plugin).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: UIConfigurationSpec defines the desired state of UIConfiguration
            properties:
              exposureType:
                default: service
                description: |-
                  ExposureType determines how the UI dashboard is exposed.
                  Valid values are: "service", "ingress", "route", "consolePlugin".
                  "service" exposes the dashboard via a Kubernetes Service (default).
                  "ingress" exposes via an Ingress resource (requires TLS).
                  "route" exposes via an OpenShift Route (OpenShift only).
                  "consolePlugin" integrates the dashboard as an OpenShift Console Plugin (OpenShift only).
                enum:
                - service
                - ingress
                - route
                - consolePlugin
                type: string
              hostname:
                description: |-
                  Hostname is the external hostname for the UI dashboard when using
                  Ingress or Route exposure types. Auto-generated if omitted.
                type: string
              ingressClassName:
                description: IngressClassName selects the Ingress controller for type=ingress.
                type: string
              replicas:
                default: 1
                description: |-
                  Replicas is the desired number of UI dashboard pod replicas.
                  Defaults to 1.
                format: int32
                minimum: 1
                type: integer
              resources:
                description: |-
                  Resources defines the compute resources (CPU/memory requests and limits)
                  for the UI dashboard pod.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              routeName:
                description: |-
                  RouteName is the name of the Route resource to create (OpenShift only, for type=route).
                  Auto-generated if omitted.
                type: string
              tls:
                description: TLS configures TLS/HTTPS for the UI dashboard.
                properties:
                  certSecretRef:
                    description: |-
                      CertSecretRef is a reference to a Kubernetes Secret containing the
                      TLS certificate and key. The Secret must contain "tls.crt" and "tls.key" fields.
                      Required if Enabled is true and IssuerRef is not set.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  enabled:
                    default: false
                    description: Enabled controls whether TLS is enabled for the UI
                      dashboard.
                    type: boolean
                  issuerRef:
                    description: |-
                      IssuerRef is an optional reference to a cert-manager Issuer or ClusterIssuer
                      for automatic certificate generation and rotation.
                      Not currently implemented; documented for future extensibility.
                    properties:
                      kind:
                        description: Kind is either "Issuer" or "ClusterIssuer". Defaults
                          to "Issuer".
                        enum:
                        - Issuer
                        - ClusterIssuer
                        type: string
                      name:
                        description: Name of the Issuer or ClusterIssuer.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - enabled
                type: object
            required:
            - exposureType
            type: object
          status:
            description: UIConfigurationStatus defines the observed state of UIConfiguration
            properties:
              availableReplicas:
                description: AvailableReplicas is the number of UI dashboard pods
                  currently ready.
                format: int32
                type: integer
              conditions:
                description: Conditions represent the latest available observations
                  of the UIConfiguration's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              desiredReplicas:
                description: DesiredReplicas is the desired number of UI dashboard
                  pods.
                format: int32
                type: integer
              exposedURL:
                description: |-
                  ExposedURL is the actual URL where the UI dashboard is accessible.
                  Set once the dashboard is successfully exposed and ready.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration reflects the generation of the spec that has been observed
                  by the controller. This is used to detect when the spec has been updated.
                format: int64
                type: integer
              phase:
                description: |-
                  Phase represents the current reconciliation phase of the UIConfiguration.
                  Values are "pending" (initial state), "active" (successfully deployed),
                  or "failed" (reconciliation failed).
                enum:
                - pending
                - active
                - failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
