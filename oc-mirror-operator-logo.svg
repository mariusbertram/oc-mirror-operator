<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Source Gradient (OpenShift / Red Hat Red) -->
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>

    <!-- Target Gradient (Private Cloud / Blue) -->
    <linearGradient id="targetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0369A1" />
    </linearGradient>

    <!-- Sync Gradient -->
    <linearGradient id="syncGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- App Icon Background with Rounded Corners -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)" />

  <!-- Outer Animated Dashed Ring representing the continuous reconciliation loop -->
  <g transform="translate(128, 116)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#1E293B" stroke-width="4" />
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#syncGrad)" stroke-width="4" stroke-dasharray="125.6 125.6" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Left: Source Registry (Upstream) -->
  <g transform="translate(80, 116)">
    <path d="M-18,-14 C-18,-21 18,-21 18,-14 L18,14 C18,21 -18,21 -18,14 Z" fill="none" stroke="url(#sourceGrad)" stroke-width="3" filter="url(#glow)"/>
    <ellipse cx="0" cy="-14" rx="18" ry="7" fill="none" stroke="url(#sourceGrad)" stroke-width="3" />
    <path d="M-18,0 C-18,7 18,7 18,0" fill="none" stroke="url(#sourceGrad)" stroke-width="3" />
  </g>

  <!-- Right: Target Registry (Private Mirror) -->
  <g transform="translate(176, 116)">
    <path d="M-18,-14 C-18,-21 18,-21 18,-14 L18,14 C18,21 -18,21 -18,14 Z" fill="none" stroke="url(#targetGrad)" stroke-width="3" filter="url(#glow)"/>
    <ellipse cx="0" cy="-14" rx="18" ry="7" fill="none" stroke="url(#targetGrad)" stroke-width="3" />
    <path d="M-18,0 C-18,7 18,7 18,0" fill="none" stroke="url(#targetGrad)" stroke-width="3" />
  </g>

  <!-- Center: Connecting Sync Arrows -->
  <g transform="translate(128, 116)">
    <!-- Source -> Target Arrow -->
    <path d="M -24,-12 C -10,-12 -10,12 10,12" fill="none" stroke="url(#syncGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
       <animate attributeName="stroke-dasharray" values="0,40; 40,0" dur="1.5s" repeatCount="indefinite" />
    </path>
    <path d="M 4,7 L 12,12 L 4,17" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
       <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
    </path>

    <!-- Target -> Source Status/Sync Arrow -->
    <path d="M 24,12 C 10,12 10,-12 -10,-12" fill="none" stroke="url(#syncGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
       <animate attributeName="stroke-dasharray" values="0,40; 40,0" dur="1.5s" begin="0.75s" repeatCount="indefinite" />
    </path>
    <path d="M -4,-7 L -12,-12 L -4,-17" fill="none" stroke="#EF4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
       <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.75s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Floating Data Particles (Blobs syncing) -->
  <g fill="#FFFFFF" opacity="0.8">
    <circle cx="128" cy="116" r="2.5">
      <animateMotion path="M -24,-12 C -10,-12 -10,12 10,12" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="128" cy="116" r="2.5">
      <animateMotion path="M 24,12 C 10,12 10,-12 -10,-12" dur="1.5s" begin="0.75s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.75s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Title Text Centered at the Bottom -->
  <g transform="translate(128, 220)" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800">
    <text x="0" y="0" font-size="20" fill="#F8FAFC" letter-spacing="0">
      <tspan fill="#EF4444">oc</tspan>-mirror
    </text>
    <text x="0" y="14" font-size="10" fill="#94A3B8" letter-spacing="2">OPERATOR</text>
  </g>
</svg>