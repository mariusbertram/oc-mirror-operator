<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Source Gradient (OpenShift / Red Hat Red) -->
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>

    <!-- Target Gradient (Private Cloud / Blue) -->
    <linearGradient id="targetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0369A1" />
    </linearGradient>

    <!-- Sync Gradient -->
    <linearGradient id="syncGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)" />

  <!-- Background Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" />
    </pattern>
    <rect width="800" height="600" fill="url(#grid)" />
  </g>

  <!-- Left: Source Registry -->
  <g transform="translate(150, 250)">
    <!-- Registry Icon/Database -->
    <path d="M-40,-30 C-40,-45 40,-45 40,-30 L40,30 C40,45 -40,45 -40,30 Z" fill="none" stroke="url(#sourceGrad)" stroke-width="4" />
    <ellipse cx="0" cy="-30" rx="40" ry="15" fill="none" stroke="url(#sourceGrad)" stroke-width="4" />
    <path d="M-40,0 C-40,15 40,15 40,0" fill="none" stroke="url(#sourceGrad)" stroke-width="4" />
    <text x="0" y="70" text-anchor="middle" fill="#EF4444" font-family="monospace" font-weight="bold" font-size="14">UPSTREAM</text>
    <text x="0" y="90" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="10">quay.io/openshift</text>

    <!-- Pulse Effect -->
    <ellipse cx="0" cy="-30" rx="40" ry="15" fill="url(#sourceGrad)" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="3s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <!-- Right: Target Registry -->
  <g transform="translate(650, 250)">
    <!-- Registry Icon/Database -->
    <path d="M-40,-30 C-40,-45 40,-45 40,-30 L40,30 C40,45 -40,45 -40,30 Z" fill="none" stroke="url(#targetGrad)" stroke-width="4" />
    <ellipse cx="0" cy="-30" rx="40" ry="15" fill="none" stroke="url(#targetGrad)" stroke-width="4" />
    <path d="M-40,0 C-40,15 40,15 40,0" fill="none" stroke="url(#targetGrad)" stroke-width="4" />
    <text x="0" y="70" text-anchor="middle" fill="#38BDF8" font-family="monospace" font-weight="bold" font-size="14">PRIVATE REGISTRY</text>
    <text x="0" y="90" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="10">mirror.local</text>

    <!-- Pulse Effect -->
    <ellipse cx="0" cy="-30" rx="40" ry="15" fill="url(#targetGrad)" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="3s" begin="1.5s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <!-- Center: The Operator (Sync Logic & Blob Buffering) -->
  <g transform="translate(400, 250)">
    <!-- Central Gear / Operator Symbol -->
    <g stroke="#94A3B8" stroke-width="3" fill="none">
      <circle cx="0" cy="0" r="40" fill="#0F172A" />
      <!-- Gear Teeth -->
      <path d="M -8,-45 L 8,-45 L 12,-38 L -12,-38 Z" fill="#0F172A" />
      <path d="M -8,45 L 8,45 L 12,38 L -12,38 Z" fill="#0F172A" />
      <path d="M -45,-8 L -45,8 L -38,12 L -38,-12 Z" fill="#0F172A" />
      <path d="M 45,-8 L 45,8 L 38,12 L 38,-12 Z" fill="#0F172A" />
      <path d="M -32,-32 L -22,-22" />
      <path d="M 32,32 L 22,22" />
      <path d="M -32,32 L -22,22" />
      <path d="M 32,-32 L 22,-22" />

      <!-- Rotation Animation -->
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite" />
    </g>

    <!-- Inner reflection/infinity symbol -->
    <g stroke="url(#syncGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -15,0 C -15,-15 0,-15 0,0 C 0,15 15,15 15,0 C 15,-15 0,-15 0,0 C 0,15 -15,15 -15,0 Z" />
    </g>

    <circle cx="0" cy="0" r="20" stroke="url(#syncGrad)" stroke-width="3" fill="none" stroke-dasharray="30 10">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Mirroring Paths / Arrows -->
  <g fill="none" stroke-width="3" filter="url(#glow)">
    <!-- Top Path: Images flowing Source -> Operator -->
    <path id="pathLeft" d="M 190,220 C 260,220 300,200 360,220" stroke="#EF4444" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="1s" repeatCount="indefinite" />
    </path>
    <!-- Top Path: Images flowing Operator -> Target -->
    <path id="pathRight" d="M 440,220 C 500,200 540,220 610,220" stroke="#38BDF8" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" values="40;0" dur="1s" repeatCount="indefinite" />
    </path>

    <!-- Bottom Path: State / Status Sync -->
    <path d="M 610,280 C 540,280 500,300 440,280" stroke="#8B5CF6" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" values="0;40" dur="1.5s" repeatCount="indefinite" />
    </path>
    <path d="M 360,280 C 300,300 260,280 190,280" stroke="#8B5CF6" stroke-dasharray="10 10">
      <animate attributeName="stroke-dashoffset" values="0;40" dur="1.5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Data Packets (Blobs) -->
  <g>
    <!-- Packet 1: Upstream -> Operator -->
    <rect x="-6" y="-6" width="12" height="12" rx="3" fill="#EF4444" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="indefinite">
        <mpath href="#pathLeft" />
      </animateMotion>
    </rect>
    <!-- Packet 2: Operator -> Target -->
    <rect x="-6" y="-6" width="12" height="12" rx="3" fill="#38BDF8" filter="url(#glow)">
      <animateMotion dur="2s" begin="1s" repeatCount="indefinite">
        <mpath href="#pathRight" />
      </animateMotion>
    </rect>
  </g>

  <!-- Floating Image Tags -->
  <g font-family="monospace" font-size="10" fill="#64748B">
    <text x="250" y="190">sha256:a1b2...</text>
    <text x="500" y="190">v4.21.9</text>
    <text x="350" y="320">STATUS: RECONCILE</text>
  </g>

  <!-- Title Text -->
  <g transform="translate(400, 480)" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="0" y="0" font-size="42" font-weight="900" fill="#F8FAFC" letter-spacing="1">
      <tspan fill="#EF4444">oc</tspan>-mirror<tspan fill="#38BDF8">-operator</tspan>
    </text>
    <text x="0" y="35" font-size="16" fill="#94A3B8" letter-spacing="3" font-weight="500">CLOUD-NATIVE REGISTRY SYNCHRONIZATION</text>
  </g>

  <!-- Technical Details Footer -->
  <g font-family="monospace" font-size="10" fill="#475569">
    <text x="40" y="560">CRD: MirrorTarget</text>
    <text x="40" y="575">CRD: ImageSet</text>
    <text x="630" y="560">BLOB_PLANNER: GREEDY</text>
    <text x="630" y="575">STATE: CONFIGMAP</text>
  </g>
</svg>