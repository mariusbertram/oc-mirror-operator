name: CI

# Runs on every push and pull request.
# Jobs: test → build (image artifact) → e2e (reuses artifact)
# Also verifies that multi-arch and bundle builds succeed.

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  # ── 2. Build operator image and export as artifact ─────────────────────────
  build:
    name: Build operator image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # Build a single-arch (amd64) image tagged with the name the e2e
      # test suite expects and save it as a tar archive for downstream jobs.
      - name: Build image
        run: CONTAINER_TOOL=docker make docker-build IMG=example.com/oc-mirror:v0.0.1

      - name: Export image to tar
        run: docker save example.com/oc-mirror:v0.0.1 -o /tmp/operator-image.tar

      - uses: actions/upload-artifact@v7
        with:
          name: operator-image
          path: /tmp/operator-image.tar
          retention-days: 1

  # ── 3. Bundle image build check ────────────────────────────────────────────
  build-bundle-check:
    name: Build bundle image check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build bundle image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bundle.Dockerfile
          platforms: linux/amd64
          push: false

  # ── 4. Multi-arch operator build check ────────────────────────────────────
  build-multiarch-check:
    name: Multi-arch build check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build operator image (linux/amd64 + linux/arm64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false

  # ── 5. E2E tests (all: cluster, catalog, OLM upgrade) ────────────────────
  # Single Kind cluster with local registry; tests run in two phases:
  #   Phase 1 — regular tests (operator deployed via make deploy)
  #   Phase 2 — OLM upgrade tests (operator installed via bundle)
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required to access v0.0.2 git tag for OLM upgrade

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download operator image artifact
        uses: actions/download-artifact@v8
        with:
          name: operator-image
          path: /tmp

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Start local registry
        run: docker run -d -p 127.0.0.1:5001:5000 --name kind-registry --restart=always registry:2

      - name: Create Kind cluster with registry mirror
        run: |
          cat <<'EOF' | kind create cluster --name oc-mirror-e2e --config=-
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          containerdConfigPatches:
          - |-
            [plugins."io.containerd.grpc.v1.cri".registry]
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors]
                [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
                  endpoint = ["http://kind-registry:5000"]
          EOF
          docker network connect kind kind-registry

      - name: Load operator image into Kind
        run: |
          docker load -i /tmp/operator-image.tar
          kind load docker-image example.com/oc-mirror:v0.0.1 --name oc-mirror-e2e

      - name: Install cert-manager v1.16.3
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
          kubectl wait deployment/cert-manager-webhook \
            --namespace cert-manager \
            --for=condition=Available \
            --timeout=120s

      # ── Phase 1: regular e2e tests ──────────────────────────────────────
      - name: "Phase 1: Run E2E tests (cluster, catalog, release)"
        run: |
          go mod tidy
          SKIP_CLUSTER_SETUP=true \
          CERT_MANAGER_INSTALL_SKIP=true \
          KIND_CLUSTER=oc-mirror-e2e \
          go test ./test/e2e/ -v -timeout 20m \
            -ginkgo.v \
            -ginkgo.label-filter="!catalog-live && !olm-upgrade"
          # label map:
          #   cluster         – needs Kind + deployed operator (mirror, catalog-cluster)
          #   catalog         – pure in-memory FBC filter tests, no cluster required
          #   release         – Cincinnati API (api.openshift.com), reachable in CI
          #   catalog-live    – quay.io/operatorhubio/catalog (~2 GB), manual only
          #   olm-upgrade     – OLM bundle upgrade tests (run in phase 2)

      # ── Phase 2: OLM upgrade test ──────────────────────────────────────
      - name: Download and install operator-sdk
        run: make operator-sdk

      - name: Build fake old bundle (v0.0.2) from git tag and push to local registry
        run: |
          mkdir -p /tmp/fake-bundle-ctx
          git archive v0.0.2 bundle/ | tar -x -C /tmp/fake-bundle-ctx
          sed -i 's|image: ghcr.io/mariusbertram/oc-mirror-operator.*|image: example.com/oc-mirror:v0.0.1|g' \
            /tmp/fake-bundle-ctx/bundle/manifests/oc-mirror.clusterserviceversion.yaml
          docker build -f bundle.Dockerfile -t localhost:5001/oc-mirror-bundle:v0.0.2 /tmp/fake-bundle-ctx
          docker push localhost:5001/oc-mirror-bundle:v0.0.2

      - name: Build new bundle image and push to local registry
        run: |
          IMG=example.com/oc-mirror:v0.0.1 VERSION=0.0.3 USE_IMAGE_DIGESTS=false \
            PATH=$PATH:$(go env GOPATH)/bin make bundle
          docker build -f bundle.Dockerfile -t localhost:5001/oc-mirror-bundle:v0.0.3 .
          docker push localhost:5001/oc-mirror-bundle:v0.0.3

      - name: Install OLM
        run: bin/operator-sdk olm install --timeout 3m

      - name: "Phase 2: Run OLM upgrade E2E tests"
        run: |
          OLD_BUNDLE_IMG=localhost:5001/oc-mirror-bundle:v0.0.2 \
          NEW_BUNDLE_IMG=localhost:5001/oc-mirror-bundle:v0.0.3 \
          OPERATOR_SDK_BIN=bin/operator-sdk \
          BUNDLE_SDK_FLAGS="--use-http" \
          SKIP_CLUSTER_SETUP=true \
          SKIP_OPERATOR_DEPLOY=true \
          CERT_MANAGER_INSTALL_SKIP=true \
          KIND_CLUSTER=oc-mirror-e2e \
          go test ./test/e2e/ -v -timeout 25m \
            -ginkgo.v \
            -ginkgo.label-filter="olm-upgrade"

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name oc-mirror-e2e
          docker rm -f kind-registry 2>/dev/null || true
