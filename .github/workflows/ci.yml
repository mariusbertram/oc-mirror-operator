name: CI

# Runs on every push and pull request.
# Jobs: test → build (image artifact) → e2e (reuses artifact)
# Also verifies that multi-arch and bundle builds succeed.

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  # ── 2. Build component images and export as artifacts ────────────────────────
  build:
    name: Build component images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # Build three separate single-arch (amd64) images tagged with the names the e2e
      # test suite expects and save them as tar archives for downstream jobs.
      - name: Build images (controller, manager, worker)
        run: |
          set -x
          CONTAINER_TOOL=docker make docker-build-all \
            IMG_CONTROLLER=example.com/oc-mirror-controller:v0.0.1 \
            IMG_MANAGER=example.com/oc-mirror-manager:v0.0.1 \
            IMG_WORKER=example.com/oc-mirror-worker:v0.0.1
          
          # Verify built images exist
          echo "Built images:"
          docker images | grep "oc-mirror"

      - name: Export images to tar
        run: |
          set -x
          echo "Exporting controller image..."
          docker save example.com/oc-mirror-controller:v0.0.1 -o operator-controller-image.tar
          echo "Exporting manager image..."
          docker save example.com/oc-mirror-manager:v0.0.1 -o operator-manager-image.tar
          echo "Exporting worker image..."
          docker save example.com/oc-mirror-worker:v0.0.1 -o operator-worker-image.tar
          
          # Verify exported files exist and have content
          echo "Exported tar files:"
          ls -lh operator-*-image.tar || (echo "ERROR: Failed to export images"; exit 1)
          du -sh operator-*-image.tar
      - uses: actions/upload-artifact@v7
        with:
          name: operator-images
          path: operator-*-image.tar
          retention-days: 1

  # ── 3. Bundle image build check ────────────────────────────────────────────
  build-bundle-check:
    name: Build bundle image check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build bundle image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bundle.Dockerfile
          platforms: linux/amd64
          push: false

  # ── 4. Multi-arch component build check ────────────────────────────────────
  build-multiarch-check:
    name: Multi-arch build check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build controller image (linux/amd64 + linux/arm64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.controller
          platforms: linux/amd64,linux/arm64
          push: false

      - name: Build manager image (linux/amd64 + linux/arm64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.manager
          platforms: linux/amd64,linux/arm64
          push: false

      - name: Build worker image (linux/amd64 + linux/arm64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64,linux/arm64
          push: false

  # ── 5. E2E tests (all: cluster, catalog, OLM upgrade) ────────────────────
  # Single Kind cluster with local registry; tests run in two phases:
  #   Phase 1 — regular tests (operator deployed via make deploy)
  #   Phase 2 — OLM upgrade tests (operator installed via bundle)
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required to access git tags for OLM upgrade

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download component images artifacts
        uses: actions/download-artifact@v8
        with:
          name: operator-images
          path: .

      - name: Install Kind v0.29.0
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.29.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Start local registry
        run: docker run -d -p 127.0.0.1:5001:5000 --name kind-registry --restart=always registry:2

      - name: Create Kind cluster with registry mirror
        run: |
          # Retry up to 3 times — KinD cluster creation can fail transiently
          # on GitHub Actions runners (kubelet cgroup race, slow I/O).
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt ==="
            kind delete cluster --name oc-mirror-e2e 2>/dev/null || true

            cat <<'EOF' | kind create cluster --name oc-mirror-e2e --wait 5m --config=-
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          # Pin node image for reproducibility (containerd 2.x, Kubernetes 1.33.1)
          nodes:
          - role: control-plane
            image: kindest/node:v1.33.1@sha256:050072256b9a903bd914c0b2866828150cb229cea0efe5892e2b644d5dd3b34f
          # containerd 2.x registry mirror config
          containerdConfigPatches:
          - |-
            [plugins."io.containerd.cri.v1.images".registry]
              config_path = "/etc/containerd/certs.d"
          EOF

            if [ $? -eq 0 ]; then
              echo "Cluster created successfully"
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "Failed to create cluster after 3 attempts"
              exit 1
            fi
            # Exponential backoff: 10s, 30s, 60s
            backoff=$((10 * attempt))
            echo "Cluster creation failed, retrying in ${backoff}s..."
            sleep $backoff
          done

          # Configure registry mirror inside the node (containerd 2.x certs.d format)
          for node in $(kind get nodes --name oc-mirror-e2e); do
            docker exec "$node" mkdir -p /etc/containerd/certs.d/localhost:5001
            docker exec "$node" sh -c 'cat > /etc/containerd/certs.d/localhost:5001/hosts.toml <<TOML
          server = "http://kind-registry:5000"

          [host."http://kind-registry:5000"]
            capabilities = ["pull", "resolve", "push"]
          TOML'
          done

          docker network connect kind kind-registry 2>/dev/null || true

      - name: Verify cluster health
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide
          kubectl wait --for=condition=Ready node --all --timeout=120s

      - name: Load component images into Kind
        run: |
          set -x
          # Verify tar files exist
          ls -lh operator-*-image.tar || (echo "ERROR: Image tar files not found"; exit 1)
          
          # Load images from tar
          echo "Loading Docker images..."
          docker load -i operator-controller-image.tar
          docker load -i operator-manager-image.tar
          docker load -i operator-worker-image.tar
          
          # Verify images exist in Docker
          echo "Verifying loaded images..."
          docker images | grep "oc-mirror"
          
          # Load images into Kind cluster
          echo "Loading images into Kind cluster..."
          kind load docker-image example.com/oc-mirror-controller:v0.0.1 --name oc-mirror-e2e
          kind load docker-image example.com/oc-mirror-manager:v0.0.1 --name oc-mirror-e2e
          kind load docker-image example.com/oc-mirror-worker:v0.0.1 --name oc-mirror-e2e
      - name: Install cert-manager v1.16.3
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
          kubectl wait deployment/cert-manager-webhook \
            --namespace cert-manager \
            --for=condition=Available \
            --timeout=300s

      # ── Phase 1: regular e2e tests ──────────────────────────────────────
      - name: "Phase 1: Run E2E tests (cluster, catalog, release)"
        run: |
          go mod tidy
          SKIP_CLUSTER_SETUP=true \
          CERT_MANAGER_INSTALL_SKIP=true \
          KIND_CLUSTER=oc-mirror-e2e \
          go test ./test/e2e/ -v -timeout 30m \
            -ginkgo.v \
            -ginkgo.label-filter="!catalog-live && !olm-upgrade"
          # label map:
          #   cluster         – needs Kind + deployed operator (mirror, catalog-cluster)
          #   catalog         – pure in-memory FBC filter tests, no cluster required
          #   release         – Cincinnati API (api.openshift.com), reachable in CI
          #   catalog-live    – quay.io/operatorhubio/catalog (~2 GB), manual only
          #   olm-upgrade     – OLM bundle upgrade tests (run in phase 2)

      # ── Phase 2: OLM upgrade test ──────────────────────────────────────
      - name: Download and install operator-sdk
        run: make operator-sdk

      - name: Determine bundle versions for OLM upgrade test
        id: bundle-ver
        run: |
          # Old bundle: from the latest release tag (the "before" state for the upgrade)
          OLD_TAG=$(git tag --sort=-version:refname | head -1)
          OLD_VER="${OLD_TAG#v}"
          # New bundle: fixed CI dev version — always higher than any release tag.
          # Real version management happens in release.yml when a v* tag is pushed.
          NEW_VER="0.0.99"
          echo "old_tag=$OLD_TAG" >> "$GITHUB_OUTPUT"
          echo "old_ver=$OLD_VER"  >> "$GITHUB_OUTPUT"
          echo "new_ver=$NEW_VER"  >> "$GITHUB_OUTPUT"
          echo "Old bundle: $OLD_TAG ($OLD_VER) → New bundle: $NEW_VER"

      - name: Pull old bundle from latest release and push to local registry
        run: |
          # Use the pre-built release bundle from ghcr.io unchanged — it has the
          # correct ghcr.io image references set by release.yml, unlike the bundle/
          # directory in the tag which may still contain local dev-registry refs.
          docker pull ghcr.io/${{ github.repository }}-bundle:${{ steps.bundle-ver.outputs.old_tag }}
          docker tag  ghcr.io/${{ github.repository }}-bundle:${{ steps.bundle-ver.outputs.old_tag }} \
                      localhost:5001/oc-mirror-bundle:${{ steps.bundle-ver.outputs.old_ver }}
          docker push localhost:5001/oc-mirror-bundle:${{ steps.bundle-ver.outputs.old_ver }}

      - name: Build new bundle image and push to local registry
        run: |
          IMG_CONTROLLER=example.com/oc-mirror-controller:v0.0.1 \
          IMG_MANAGER=example.com/oc-mirror-manager:v0.0.1 \
          IMG_WORKER=example.com/oc-mirror-worker:v0.0.1 \
          VERSION=${{ steps.bundle-ver.outputs.new_ver }} \
          USE_IMAGE_DIGESTS=false \
            PATH=$PATH:$(go env GOPATH)/bin make bundle
          docker build -f bundle.Dockerfile -t localhost:5001/oc-mirror-bundle:${{ steps.bundle-ver.outputs.new_ver }} .
          docker push localhost:5001/oc-mirror-bundle:${{ steps.bundle-ver.outputs.new_ver }}

      - name: Install OLM
        run: bin/operator-sdk olm install --timeout 5m

      - name: "Phase 2: Run OLM upgrade E2E tests"
        run: |
          OLD_BUNDLE_IMG=localhost:5001/oc-mirror-bundle:${{ steps.bundle-ver.outputs.old_ver }} \
          NEW_BUNDLE_IMG=localhost:5001/oc-mirror-bundle:${{ steps.bundle-ver.outputs.new_ver }} \
          OPERATOR_SDK_BIN=bin/operator-sdk \
          BUNDLE_SDK_FLAGS="--use-http" \
          SKIP_CLUSTER_SETUP=true \
          SKIP_OPERATOR_DEPLOY=true \
          CERT_MANAGER_INSTALL_SKIP=true \
          KIND_CLUSTER=oc-mirror-e2e \
          go test ./test/e2e/ -v -timeout 30m \
            -ginkgo.v \
            -ginkgo.label-filter="olm-upgrade"

      - name: Diagnostic dump on failure
        if: failure()
        run: |
          echo "=== Cluster Nodes ==="
          kubectl get nodes -o wide || true
          echo "=== All Pods ==="
          kubectl get pods -A -o wide || true
          echo "=== Deployments (all namespaces) ==="
          kubectl get deployments -A -o wide || true
          echo "=== Describe Deployments in oc-mirror-system ==="
          kubectl describe deployments -n oc-mirror-system || true
          echo "=== Describe Pods in oc-mirror-system ==="
          kubectl describe pods -n oc-mirror-system || true
          echo "=== Failed/Pending Pod Events ==="
          kubectl get events -A --sort-by=.lastTimestamp | grep -E "Failed|ErrImagePull|ImagePullBackOff|Pending|Warning" | tail -50 || true
          echo "=== All Events (last 80) ==="
          kubectl get events -A --sort-by=.lastTimestamp | tail -80 || true
          echo "=== Controller-Manager Logs (oc-mirror-system) ==="
          kubectl logs -l control-plane=controller-manager -n oc-mirror-system --tail=100 --all-containers 2>/dev/null || true
          echo "=== Images loaded in Kind nodes ==="
          for node in $(kind get nodes --name oc-mirror-e2e 2>/dev/null); do
            echo "--- Node: $node ---"
            docker exec "$node" crictl images 2>/dev/null | grep -E "oc-mirror|example.com" || true
          done
          echo "=== Controller-Manager Logs (oc-mirror-operator / OLM) ==="
          kubectl logs -l control-plane=controller-manager -n oc-mirror-operator --tail=100 --all-containers 2>/dev/null || true
          echo "=== OLM Pods ==="
          kubectl get pods -n olm -o wide 2>/dev/null || true
          echo "=== CSVs ==="
          kubectl get csv -A 2>/dev/null || true
          echo "=== Deployments in oc-mirror-operator ==="
          kubectl get deployments -n oc-mirror-operator -o wide 2>/dev/null || true
          echo "=== Roles in oc-mirror-operator ==="
          kubectl get roles -n oc-mirror-operator 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name oc-mirror-e2e
          docker rm -f kind-registry 2>/dev/null || true
