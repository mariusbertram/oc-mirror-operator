name: CI

# Runs on every push and pull request.
# Jobs: test → build (image artifact) → e2e (reuses artifact)
# Also verifies that multi-arch and bundle builds succeed.

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  # ── 2. Build operator image and export as artifact ─────────────────────────
  build:
    name: Build operator image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # Build a single-arch (amd64) image tagged with the name the e2e
      # test suite expects and save it as a tar archive for downstream jobs.
      - name: Build image
        run: CONTAINER_TOOL=docker make docker-build IMG=example.com/oc-mirror:v0.0.1

      - name: Export image to tar
        run: docker save example.com/oc-mirror:v0.0.1 -o /tmp/operator-image.tar

      - uses: actions/upload-artifact@v7
        with:
          name: operator-image
          path: /tmp/operator-image.tar
          retention-days: 1

  # ── 3. Bundle image build check ────────────────────────────────────────────
  build-bundle-check:
    name: Build bundle image check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build bundle image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bundle.Dockerfile
          platforms: linux/amd64
          push: false

  # ── 4. Multi-arch operator build check ────────────────────────────────────
  build-multiarch-check:
    name: Multi-arch build check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build operator image (linux/amd64 + linux/arm64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false

  # ── 5. E2E tests (reuses image from build job) ─────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download operator image artifact
        uses: actions/download-artifact@v8
        with:
          name: operator-image
          path: /tmp

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create Kind cluster
        run: kind create cluster --name oc-mirror-test-e2e

      - name: Load operator image into Kind
        run: |
          docker load -i /tmp/operator-image.tar
          kind load docker-image example.com/oc-mirror:v0.0.1 --name oc-mirror-test-e2e

      - name: Install cert-manager v1.16.3
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
          kubectl wait deployment/cert-manager-webhook \
            --namespace cert-manager \
            --for=condition=Available \
            --timeout=120s

      - name: Run E2E tests
        run: |
          go mod tidy
          SKIP_CLUSTER_SETUP=true \
          CERT_MANAGER_INSTALL_SKIP=true \
          KIND_CLUSTER=oc-mirror-test-e2e \
          go test ./test/e2e/ -v -timeout 20m \
            -ginkgo.v \
            -ginkgo.label-filter="!catalog-live"
          # label map:
          #   cluster              – needs Kind + deployed operator (e2e_mirror_test.go)
          #   catalog-cluster      – needs Kind + small brtrm-dev-catalog (GHCR, ip-rule-operator)
          #   catalog              – pure in-memory FBC filter tests, no cluster required
          #   release / integration – Cincinnati API (api.openshift.com), reachable in CI
          #   catalog-live         – quay.io/operatorhubio/catalog (~2 GB), manual only

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name oc-mirror-test-e2e

  # ── 6. E2E OLM upgrade test ────────────────────────────────────────────────
  # Installs the previous release bundle via OLM, then upgrades to the
  # freshly-built bundle and verifies RBAC is correctly provisioned.
  e2e-olm-upgrade:
    name: E2E OLM upgrade test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download operator image artifact
        uses: actions/download-artifact@v8
        with:
          name: operator-image
          path: /tmp

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create Kind cluster
        run: kind create cluster --name oc-mirror-olm-test

      - name: Load operator image into Kind
        run: |
          docker load -i /tmp/operator-image.tar
          kind load docker-image example.com/oc-mirror:v0.0.1 --name oc-mirror-olm-test

      - name: Build new bundle image and load into Kind
        run: |
          # Regenerate bundle pointing at the operator image already in Kind.
          # VERSION=0.0.3 ensures a different semver from the old bundle (v0.0.2)
          # so operator-sdk run bundle-upgrade can replace it.
          IMG=example.com/oc-mirror:v0.0.1 VERSION=0.0.3 USE_IMAGE_DIGESTS=false \
            PATH=$PATH:$(go env GOPATH)/bin make bundle
          docker build -f bundle.Dockerfile -t oc-mirror-bundle:v0.0.3 .
          kind load docker-image oc-mirror-bundle:v0.0.3 --name oc-mirror-olm-test

      - name: Download and install operator-sdk
        run: make operator-sdk

      - name: Install OLM
        run: bin/operator-sdk olm install --timeout 3m

      - name: Run OLM upgrade e2e test
        run: |
          go mod tidy
          OLD_BUNDLE_IMG=ghcr.io/mariusbertram/oc-mirror-operator-bundle:v0.0.2 \
          NEW_BUNDLE_IMG=oc-mirror-bundle:v0.0.3 \
          OPERATOR_SDK_BIN=bin/operator-sdk \
          SKIP_CLUSTER_SETUP=true \
          SKIP_OPERATOR_DEPLOY=true \
          CERT_MANAGER_INSTALL_SKIP=true \
          go test ./test/e2e/ -v -timeout 25m \
            -ginkgo.v \
            -ginkgo.label-filter="olm-upgrade"

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name oc-mirror-olm-test
