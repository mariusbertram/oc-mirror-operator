name: Release

# Triggered when a version tag (v*) is pushed.
# Builds a multi-arch operator image, a bundle image, creates a GitHub
# Release, and opens a PR in the brtrm-dev-catalog repo to register the
# new bundle version.
#
# Required secrets:
#   CATALOG_PAT  – Personal Access Token with repo write access to
#                  mariusbertram/brtrm-dev-catalog (Contents + Pull requests)

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  CONTROLLER_IMAGE: ghcr.io/${{ github.repository }}-controller
  MANAGER_IMAGE: ghcr.io/${{ github.repository }}-manager
  WORKER_IMAGE: ghcr.io/${{ github.repository }}-worker
  DASHBOARD_IMAGE: ghcr.io/${{ github.repository }}-dashboard
  BUNDLE_IMAGE: ghcr.io/${{ github.repository }}-bundle
  CATALOG_REPO: mariusbertram/brtrm-dev-catalog

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  # ── 2. Build & push component images (multi-arch) ──────────────────────────
  build-operator:
    name: Build component images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      controller_digest: ${{ steps.build-controller.outputs.digest }}
      manager_digest: ${{ steps.build-manager.outputs.digest }}
      worker_digest: ${{ steps.build-worker.outputs.digest }}
      dashboard_digest: ${{ steps.build-dashboard.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: meta
        run: |
          # Strip leading 'v': v0.0.2 → 0.0.2
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push controller image
        id: build-controller
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.controller
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.CONTROLLER_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.CONTROLLER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=oc-mirror-operator-controller
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push manager image
        id: build-manager
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.manager
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.MANAGER_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.MANAGER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=oc-mirror-operator-manager
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push worker image
        id: build-worker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.WORKER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=oc-mirror-operator-worker
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push dashboard image
        id: build-dashboard
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.dashboard
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.DASHBOARD_IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=oc-mirror-operator-dashboard
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ── 3. Build & push bundle image (multi-arch) ────────────────────────────
  build-bundle:
    name: Build bundle image
    runs-on: ubuntu-latest
    needs: build-operator
    permissions:
      contents: read
      packages: write
    outputs:
      # Tag reference (human-readable, mutable)
      bundle_image: ${{ steps.bundle-ref.outputs.ref }}
      # Manifest-list digest (immutable, used for catalog PR and disconnected envs)
      bundle_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release bundle
        env:
          VERSION: ${{ needs.build-operator.outputs.version }}
        run: |
          set -euo pipefail
          CSV="bundle/manifests/oc-mirror.clusterserviceversion.yaml"

          # USE_IMAGE_DIGESTS=true is the Makefile default: operator-sdk pulls
          # controller, manager and worker by their :v<VERSION> tags, resolves
          # them to digest refs, and writes all three into spec.relatedImages.
          # IMG_CONTROLLER/MANAGER/WORKER are derived from VERSION automatically.
          VERSION="${VERSION}" make manifests bundle

          echo "spec.relatedImages:"
          yq '.spec.relatedImages' "$CSV"

          yq '.spec.relatedImages[].image' "$CSV" | grep -q "oc-mirror-operator-controller@sha256:" \
            || { echo "ERROR: controller not in spec.relatedImages"; exit 1; }
          yq '.spec.relatedImages[].image' "$CSV" | grep -q "oc-mirror-operator-manager@sha256:" \
            || { echo "ERROR: manager not in spec.relatedImages"; exit 1; }
          yq '.spec.relatedImages[].image' "$CSV" | grep -q "oc-mirror-operator-worker@sha256:" \
            || { echo "ERROR: worker not in spec.relatedImages"; exit 1; }
          yq '.spec.relatedImages[].image' "$CSV" | grep -q "oc-mirror-operator-dashboard" \
            || { echo "ERROR: dashboard not in spec.relatedImages"; exit 1; }
          echo "OK: all 4 images verified in spec.relatedImages"

      # QEMU is required for cross-compilation of the arm64 layer during
      # multi-arch bundle builds. The bundle contains only YAML (no binaries),
      # but OCI manifests still carry an os/arch header — a multi-arch manifest
      # list ensures OPM init-containers can pull the bundle on any node arch.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bundle image (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bundle.Dockerfile
          # Build a manifest list covering both arches. Even though the bundle
          # contains only YAML, OPM init-containers run on the node and must
          # be able to pull the image on any supported architecture.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BUNDLE_IMAGE }}:${{ needs.build-operator.outputs.version }}
            ${{ env.BUNDLE_IMAGE }}:latest

      - name: Emit bundle image ref
        id: bundle-ref
        run: |
          echo "ref=${{ env.BUNDLE_IMAGE }}:${{ needs.build-operator.outputs.version }}" \
            >> "$GITHUB_OUTPUT"
          echo "Bundle image: ${{ env.BUNDLE_IMAGE }}:${{ needs.build-operator.outputs.version }}"
          echo "Bundle manifest-list digest: ${{ steps.build.outputs.digest }}"

  # ── 4. GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-operator, build-bundle]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog (commits since last tag)
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline "${PREV_TAG}..HEAD" -- 2>/dev/null | head -50)
          else
            LOG=$(git log --oneline HEAD | head -50)
          fi
          # Multiline output via heredoc delimiter
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "oc-mirror-operator ${{ github.ref_name }}"
          body: |
            ## oc-mirror-operator ${{ github.ref_name }}

            ### Container Images

            | Image | Tag | Digest (manifest list) |
            |-------|-----|------------------------|
            | Controller (multi-arch) | `${{ env.CONTROLLER_IMAGE }}:${{ github.ref_name }}` | `${{ needs.build-operator.outputs.controller_digest }}` |
            | Manager (multi-arch) | `${{ env.MANAGER_IMAGE }}:${{ github.ref_name }}` | `${{ needs.build-operator.outputs.manager_digest }}` |
            | Worker (multi-arch) | `${{ env.WORKER_IMAGE }}:${{ github.ref_name }}` | `${{ needs.build-operator.outputs.worker_digest }}` |
            | Dashboard (multi-arch) | `${{ env.DASHBOARD_IMAGE }}:${{ github.ref_name }}` | `${{ needs.build-operator.outputs.dashboard_digest }}` |
            | Bundle (multi-arch)   | `${{ needs.build-bundle.outputs.bundle_image }}` | `${{ needs.build-bundle.outputs.bundle_digest }}` |

            ### Changes

            ${{ steps.changelog.outputs.log }}

            ### Installation

            See [user guide](docs/user-guide.md) for full installation instructions.

  # ── 5. PR in catalog repo ─────────────────────────────────────────────────
  catalog-pr:
    name: Open catalog PR
    runs-on: ubuntu-latest
    needs: [build-operator, build-bundle]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Create catalog PR
        env:
          GH_TOKEN: ${{ secrets.CATALOG_PAT }}
          VERSION: ${{ needs.build-operator.outputs.version }}
          BUNDLE_REF: ${{ needs.build-bundle.outputs.bundle_image }}
          BUNDLE_DIGEST: ${{ needs.build-bundle.outputs.bundle_digest }}
        run: |
          set -euo pipefail

          # Use digest-pinned reference for reproducible disconnected installs.
          # The manifest-list digest from build-push-action covers all platforms.
          BUNDLE_DIGEST_REF="${{ env.BUNDLE_IMAGE }}@${BUNDLE_DIGEST}"

          # ── Clone catalog repo ──────────────────────────────────────────
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${CATALOG_REPO}.git" /tmp/catalog
          cd /tmp/catalog

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="add-oc-mirror-v${VERSION}"
          git checkout -b "$BRANCH"

          # ── Write operator.yaml (olm.semver template) ──────────────────
          OPERATOR_DIR="catalog/oc-mirror"
          mkdir -p "${OPERATOR_DIR}/logo"

          # If an operator.yaml already exists, append the new bundle image
          # to the Stable.Bundles list. Otherwise create a fresh file.
          YAML_FILE="${OPERATOR_DIR}/operator.yaml"

          if [ -f "$YAML_FILE" ]; then
            # Append new version only if not already present (check both digest and tag)
            if grep -qF "${BUNDLE_DIGEST_REF}" "$YAML_FILE" || grep -qF "${BUNDLE_REF}" "$YAML_FILE"; then
              echo "Bundle ${BUNDLE_DIGEST_REF} already present — nothing to do."
              exit 0
            fi
            python3 - <<PYEOF
          import yaml, sys
          path = "${YAML_FILE}"
          with open(path) as f:
              data = yaml.safe_load(f)
          bundles = data.setdefault("Stable", {}).setdefault("Bundles", [])
          bundles.append({"Image": "${BUNDLE_DIGEST_REF}"})
          with open(path, "w") as f:
              yaml.dump(data, f, default_flow_style=False, sort_keys=False)
          print("Appended bundle to", path)
          PYEOF
          else
            cat > "$YAML_FILE" <<YAMLEOF
          schema: olm.semver
          GenerateMajorChannels: true
          GenerateMinorChannels: true
          Stable:
            Bundles:
              - Image: ${BUNDLE_DIGEST_REF}
          YAMLEOF
          fi

          # ── Copy logo ───────────────────────────────────────────────────
          # Source the logo from the operator repo (checked out in step 1)
          LOGO_SRC="${GITHUB_WORKSPACE}/docs/oc-mirror-operator-logo.svg"
          if [ -f "$LOGO_SRC" ]; then
            cp "$LOGO_SRC" "${OPERATOR_DIR}/logo/oc-mirror-operator-logo.svg"
          fi

          # ── Commit & push ───────────────────────────────────────────────
          git add "${OPERATOR_DIR}"
          git diff --cached --stat

          git commit -m "feat(oc-mirror): add oc-mirror-operator v${VERSION}

          Bundle image: ${BUNDLE_DIGEST_REF}
          Controller image: ${{ env.CONTROLLER_IMAGE }}:${{ github.ref_name }}@${{ needs.build-operator.outputs.controller_digest }}"

          git push origin "$BRANCH"

          # ── Open PR ─────────────────────────────────────────────────────
          gh pr create \
            --repo "${CATALOG_REPO}" \
            --base main \
            --head "$BRANCH" \
            --title "feat(oc-mirror): add oc-mirror-operator v${VERSION}" \
            --body "## oc-mirror-operator v${VERSION}

          This PR registers the new release in the brtrm-dev-catalog.

          ### Bundle Image (multi-arch manifest list)
          \`\`\`
          ${BUNDLE_DIGEST_REF}
          \`\`\`

          ### Component Images (multi-arch)
          \`\`\`
          Controller: ${{ env.CONTROLLER_IMAGE }}:${{ github.ref_name }}@${{ needs.build-operator.outputs.controller_digest }}
          Manager: ${{ env.MANAGER_IMAGE }}:${{ github.ref_name }}@${{ needs.build-operator.outputs.manager_digest }}
          Worker: ${{ env.WORKER_IMAGE }}:${{ github.ref_name }}@${{ needs.build-operator.outputs.worker_digest }}
          Dashboard: ${{ env.DASHBOARD_IMAGE }}:${{ github.ref_name }}@${{ needs.build-operator.outputs.dashboard_digest }}
          \`\`\`

          Opened automatically by the [release workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
