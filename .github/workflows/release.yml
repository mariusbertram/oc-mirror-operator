name: Release

# Triggered when a version tag (v*) is pushed.
# Builds a multi-arch operator image, a bundle image, creates a GitHub
# Release, and opens a PR in the brtrm-dev-catalog repo to register the
# new bundle version.
#
# Required secrets:
#   CATALOG_PAT  – Personal Access Token with repo write access to
#                  mariusbertram/brtrm-dev-catalog (Contents + Pull requests)

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository }}
  BUNDLE_IMAGE: ghcr.io/${{ github.repository }}-bundle
  CATALOG_REPO: mariusbertram/brtrm-dev-catalog

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  # ── 2. Build & push operator image (multi-arch) ───────────────────────────
  build-operator:
    name: Build operator image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          # Strip leading 'v': v0.0.2 → 0.0.2
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push operator image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.OPERATOR_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.OPERATOR_IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=oc-mirror-operator
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ── 3. Build & push bundle image ─────────────────────────────────────────
  build-bundle:
    name: Build bundle image
    runs-on: ubuntu-latest
    needs: build-operator
    permissions:
      contents: read
      packages: write
    outputs:
      bundle_image: ${{ steps.bundle-ref.outputs.ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject operator image digest into CSV
        run: |
          VERSION="${{ needs.build-operator.outputs.version }}"
          DIGEST="${{ needs.build-operator.outputs.digest }}"
          NEW_REF="${{ env.OPERATOR_IMAGE }}@${DIGEST}"

          # Replace every digest reference in the bundle CSV
          sed -i "s|${{ env.OPERATOR_IMAGE }}@sha256:[a-f0-9]*|${NEW_REF}|g" \
            bundle/manifests/oc-mirror.clusterserviceversion.yaml

          echo "CSV updated to use: ${NEW_REF}"
          grep "image:" bundle/manifests/oc-mirror.clusterserviceversion.yaml | head -5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bundle image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bundle.Dockerfile
          # Bundle images are OCI artifacts, not runnable containers —
          # the operator-framework tooling (opm) handles them via
          # registry pull, so multi-arch is not required here.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.BUNDLE_IMAGE }}:${{ needs.build-operator.outputs.version }}
            ${{ env.BUNDLE_IMAGE }}:latest

      - name: Emit bundle image ref
        id: bundle-ref
        run: |
          echo "ref=${{ env.BUNDLE_IMAGE }}:${{ needs.build-operator.outputs.version }}" \
            >> "$GITHUB_OUTPUT"

  # ── 4. GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-operator, build-bundle]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog (commits since last tag)
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline "${PREV_TAG}..HEAD" -- 2>/dev/null | head -50)
          else
            LOG=$(git log --oneline HEAD | head -50)
          fi
          # Multiline output via heredoc delimiter
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "oc-mirror-operator ${{ github.ref_name }}"
          body: |
            ## oc-mirror-operator ${{ github.ref_name }}

            ### Container Images

            | Image | Reference |
            |-------|-----------|
            | Operator | `${{ env.OPERATOR_IMAGE }}:${{ github.ref_name }}` |
            | Bundle   | `${{ needs.build-bundle.outputs.bundle_image }}` |

            ### Changes

            ${{ steps.changelog.outputs.log }}

            ### Installation

            See [user guide](docs/user-guide.md) for full installation instructions.

  # ── 5. PR in catalog repo ─────────────────────────────────────────────────
  catalog-pr:
    name: Open catalog PR
    runs-on: ubuntu-latest
    needs: [build-operator, build-bundle]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Create catalog PR
        env:
          GH_TOKEN: ${{ secrets.CATALOG_PAT }}
          VERSION: ${{ needs.build-operator.outputs.version }}
          BUNDLE_REF: ${{ needs.build-bundle.outputs.bundle_image }}
        run: |
          set -euo pipefail

          # ── Clone catalog repo ──────────────────────────────────────────
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${CATALOG_REPO}.git" /tmp/catalog
          cd /tmp/catalog

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="add-oc-mirror-v${VERSION}"
          git checkout -b "$BRANCH"

          # ── Write operator.yaml (olm.semver template) ──────────────────
          OPERATOR_DIR="catalog/oc-mirror"
          mkdir -p "${OPERATOR_DIR}/logo"

          # If an operator.yaml already exists, append the new bundle image
          # to the Stable.Bundles list. Otherwise create a fresh file.
          YAML_FILE="${OPERATOR_DIR}/operator.yaml"

          if [ -f "$YAML_FILE" ]; then
            # Append new version only if not already present
            if grep -qF "${BUNDLE_REF}" "$YAML_FILE"; then
              echo "Bundle ${BUNDLE_REF} already present — nothing to do."
              exit 0
            fi
            python3 - <<PYEOF
          import yaml, sys
          path = "${YAML_FILE}"
          with open(path) as f:
              data = yaml.safe_load(f)
          bundles = data.setdefault("Stable", {}).setdefault("Bundles", [])
          bundles.append({"Image": "${BUNDLE_REF}"})
          with open(path, "w") as f:
              yaml.dump(data, f, default_flow_style=False, sort_keys=False)
          print("Appended bundle to", path)
          PYEOF
          else
            cat > "$YAML_FILE" <<YAMLEOF
          schema: olm.semver
          GenerateMajorChannels: true
          GenerateMinorChannels: true
          Stable:
            Bundles:
              - Image: ${BUNDLE_REF}
          YAMLEOF
          fi

          # ── Copy logo ───────────────────────────────────────────────────
          # Source the logo from the operator repo (checked out in step 1)
          LOGO_SRC="${GITHUB_WORKSPACE}/oc-mirror-operator-logo.svg"
          if [ -f "$LOGO_SRC" ]; then
            cp "$LOGO_SRC" "${OPERATOR_DIR}/logo/oc-mirror-operator-logo.svg"
          fi

          # ── Commit & push ───────────────────────────────────────────────
          git add "${OPERATOR_DIR}"
          git diff --cached --stat

          git commit -m "feat(oc-mirror): add oc-mirror-operator v${VERSION}

          Bundle image: ${BUNDLE_REF}
          Operator image: ${{ env.OPERATOR_IMAGE }}:${{ github.ref_name }}@${{ needs.build-operator.outputs.digest }}"

          git push origin "$BRANCH"

          # ── Open PR ─────────────────────────────────────────────────────
          gh pr create \
            --repo "${CATALOG_REPO}" \
            --base main \
            --head "$BRANCH" \
            --title "feat(oc-mirror): add oc-mirror-operator v${VERSION}" \
            --body "## oc-mirror-operator v${VERSION}

          This PR registers the new release in the brtrm-dev-catalog.

          ### Bundle Image
          \`\`\`
          ${BUNDLE_REF}
          \`\`\`

          ### Operator Image
          \`\`\`
          ${{ env.OPERATOR_IMAGE }}:${{ github.ref_name }}@${{ needs.build-operator.outputs.digest }}
          \`\`\`

          Opened automatically by the [release workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
