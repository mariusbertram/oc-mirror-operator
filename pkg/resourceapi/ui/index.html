<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OC-Mirror Operator</title>
    <link rel="stylesheet" href="css/patternfly.min.css">
    <link rel="stylesheet" href="css/patternfly-addons.css">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        :root {
            --pf-v5-global--FontFamily--redhat--display: "Red Hat Display", sans-serif;
            --pf-v5-global--FontFamily--redhat--text: "Red Hat Text", sans-serif;
            --oc-brand-color: #0066cc;
            --oc-masthead-bg: #151515;
            --oc-sidebar-bg: #212427;
            --oc-accent-color: #ee0000;
        }
        @font-face {
            font-family: 'Red Hat Text';
            src: url('fonts/RedHatText-Regular.woff2') format('woff2');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Red Hat Text';
            src: url('fonts/RedHatText-Medium.woff2') format('woff2');
            font-weight: 500;
        }
        @font-face {
            font-family: 'Red Hat Text';
            src: url('fonts/RedHatText-Bold.woff2') format('woff2');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Red Hat Display';
            src: url('fonts/RedHatDisplay-Medium.woff2') format('woff2');
            font-weight: 500;
        }
        @font-face {
            font-family: 'Red Hat Display';
            src: url('fonts/RedHatDisplay-Bold.woff2') format('woff2');
            font-weight: 700;
        }

        body {
            background-color: var(--pf-v5-global--BackgroundColor--200);
            border-top: 3px solid var(--oc-accent-color);
        }

        /* Masthead (Always Dark) */
        .pf-v5-c-masthead {
            background-color: var(--oc-masthead-bg);
            color: #fff;
        }

        .pf-v5-c-masthead__logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
        }
        .pf-v5-c-masthead__logo img {
            height: 28px;
        }
        .pf-v5-c-masthead__logo-text {
            font-size: 1.15rem;
            font-weight: 400;
            color: #fff;
        }

        /* Sidebar (Always Dark) */
        .pf-v5-c-page__sidebar {
            background-color: var(--oc-sidebar-bg);
            color: #d2d2d2;
        }

        .pf-v5-c-nav__link {
            font-size: 0.9rem;
            color: #d2d2d2 !important;
        }

        .pf-v5-c-nav__link:hover {
            color: #fff !important;
        }

        .pf-v5-c-nav__link.pf-m-current {
            background-color: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--oc-brand-color);
            color: #fff !important;
            font-weight: 600;
        }

        .perspective-switcher {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            color: #fff;
        }

        /* Main Content (Light) */
        .pf-v5-c-page__main-section {
            background-color: transparent;
        }

        .pf-v5-c-page__main-section.pf-m-light {
            background-color: var(--pf-v5-global--BackgroundColor--100);
            border-bottom: 1px solid var(--pf-v5-global--BorderColor--100);
            padding-bottom: 0;
        }

        /* Overview Page Layout */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: var(--pf-v5-global--spacer--lg);
        }

        .overview-column-main { grid-column: span 8; }
        .overview-column-side { grid-column: span 4; }

        @media (max-width: 1200px) {
            .overview-column-main, .overview-column-side { grid-column: span 12; }
        }

        .status-complete { color: var(--pf-v5-global--success-color--100); }
        .status-mirroring { color: var(--pf-v5-global--warning-color--100); }
        .status-failed { color: var(--pf-v5-global--danger-color--100); }

        .pf-v5-c-card {
            box-shadow: var(--pf-v5-global--BoxShadow--sm);
        }

        .pf-v5-c-card__title {
            font-size: 1rem;
            font-weight: 700;
            border-bottom: 1px solid var(--pf-v5-global--BorderColor--100);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .progress-stepper {
            display: flex;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            background: var(--pf-v5-global--BackgroundColor--200);
            margin: 12px 0;
        }
        .progress-stepper-item { height: 100%; transition: width 0.3s ease; }
        .progress-stepper-item.complete { background: var(--pf-v5-global--success-color--100); }
        .progress-stepper-item.pending { background: var(--pf-v5-global--warning-color--100); }
        .progress-stepper-item.failed { background: var(--pf-v5-global--danger-color--100); }

        .pf-v5-c-tabs__link {
            padding: 12px 16px;
        }

        .pf-v5-u-color-200 {
            color: var(--pf-v5-global--Color--200) !important;
        }

        /* YAML tab code blocks */
        .yaml-resource-block {
            margin-bottom: var(--pf-v5-global--spacer--lg);
        }
        .yaml-resource-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--pf-v5-global--BackgroundColor--200);
            padding: 8px 12px;
            border-radius: 4px 4px 0 0;
            border: 1px solid var(--pf-v5-global--BorderColor--100);
            border-bottom: none;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .yaml-resource-pre {
            margin: 0;
            padding: 12px;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: "Red Hat Text", monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            overflow-x: auto;
            border-radius: 0 0 4px 4px;
            border: 1px solid var(--pf-v5-global--BorderColor--100);
            white-space: pre;
        }

        /* Condition rows */
        .condition-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid var(--pf-v5-global--BorderColor--100);
        }
        .condition-row:last-child { border-bottom: none; }
        .condition-row__icon { min-width: 16px; margin-top: 2px; }
        .condition-row__body { flex: 1; min-width: 0; }
        .condition-row__title { font-weight: 600; font-size: 0.875rem; }
        .condition-row__sub { font-size: 0.75rem; color: var(--pf-v5-global--Color--200); word-break: break-word; }
    </style>
</head>
<body>
    <div class="pf-v5-c-page" id="page">
        <header class="pf-v5-c-masthead">
            <div class="pf-v5-c-masthead__main">
                <a class="pf-v5-c-masthead__logo" href="#/">
                    <img src="logo.svg" alt="oc-mirror logo">
                    <span class="pf-v5-c-masthead__logo-text">OC-Mirror <strong>Operator</strong></span>
                </a>
            </div>
            <div class="pf-v5-c-masthead__content">
                <div class="pf-v5-l-flex pf-m-align-items-center pf-m-justify-content-flex-end" style="width: 100%">
                    <div class="pf-v5-l-flex__item">
                        <span class="pf-v5-u-font-size-sm" id="refresh-info">Auto-refresh: 30s</span>
                    </div>
                    <div class="pf-v5-l-flex__item pf-v5-u-ml-md">
                        <i class="fas fa-question-circle"></i>
                    </div>
                    <div class="pf-v5-l-flex__item pf-v5-u-ml-md">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div class="pf-v5-l-flex__item pf-v5-u-ml-md">
                        <i class="fas fa-th"></i>
                    </div>
                    <div class="pf-v5-l-flex__item pf-v5-u-ml-md">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </div>
        </header>

        <div class="pf-v5-c-page__sidebar pf-m-expanded" id="sidebar">
            <div class="pf-v5-c-page__sidebar-body">
                <div class="perspective-switcher">
                    <button class="pf-v5-c-button pf-m-plain pf-v5-u-font-size-sm" style="color: #fff">
                        <i class="fas fa-cog pf-v5-u-mr-sm"></i> Administrator
                    </button>
                </div>
                <nav class="pf-v5-c-nav" aria-label="Global">
                    <ul class="pf-v5-c-nav__list">
                        <li class="pf-v5-c-nav__item">
                            <a href="#/" class="pf-v5-c-nav__link pf-m-current" id="nav-dashboard">
                                <i class="fas fa-tachometer-alt pf-v5-u-mr-md"></i> Overview
                            </a>
                        </li>
                        <li class="pf-v5-c-nav__item">
                            <a href="https://github.com/mariusbertram/oc-mirror-operator" class="pf-v5-c-nav__link" target="_blank">
                                <i class="fas fa-book pf-v5-u-mr-md"></i> Documentation
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

        <main class="pf-v5-c-page__main" tabindex="-1">
            <section class="pf-v5-c-page__main-section pf-m-light" id="header-section">
                <div class="pf-v5-l-flex pf-m-justify-content-space-between pf-m-align-items-flex-end">
                    <div class="pf-v5-l-flex__item">
                        <h1 class="pf-v5-c-title pf-m-2xl pf-v5-u-mb-md" id="page-title">Overview</h1>
                    </div>
                </div>
                <div class="pf-v5-c-tabs" id="tabs" style="display:none">
                    <ul class="pf-v5-c-tabs__list">
                        <li class="pf-v5-c-tabs__item pf-m-current" id="tab-item-overview">
                            <button class="pf-v5-c-tabs__link" id="tab-overview">Overview</button>
                        </li>
                        <li class="pf-v5-c-tabs__item" id="tab-item-yaml">
                            <button class="pf-v5-c-tabs__link" id="tab-yaml">YAML</button>
                        </li>
                    </ul>
                </div>
            </section>

            <section class="pf-v5-c-page__main-section" id="app">
                <div class="pf-v5-l-bullseye">
                    <div class="pf-v5-c-spinner" role="progressbar" aria-label="Loading content">
                        <span class="pf-v5-c-spinner__clipper"></span>
                        <span class="pf-v5-c-spinner__lead"></span>
                        <span class="pf-v5-c-spinner__tail"></span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
    (() => {
        "use strict";

        const REFRESH_INTERVAL = 30000;
        const app = document.getElementById("app");
        const pageTitle = document.getElementById("page-title");
        const tabs = document.getElementById("tabs");
        const tabItemOverview = document.getElementById("tab-item-overview");
        const tabItemYaml = document.getElementById("tab-item-yaml");
        const tabOverview = document.getElementById("tab-overview");
        const tabYaml = document.getElementById("tab-yaml");
        let refreshTimer = null;
        let currentView = { name: "dashboard" };

        function navigate(view) {
            // Preserve the active tab when refreshing the same target; reset when navigating away.
            if (view.name !== currentView.name || view.target !== currentView.target) {
                view.tab = "overview";
            } else {
                view.tab = currentView.tab || "overview";
            }
            currentView = view;
            render();
        }

        function parseHash() {
            const hash = location.hash.replace(/^#\/?/, "") || "";
            if (!hash || hash === "/") return { name: "dashboard" };
            const parts = hash.split("/");
            if (parts.length === 1) return { name: "target", target: parts[0] };
            return { name: "dashboard" };
        }

        window.addEventListener("hashchange", () => navigate(parseHash()));

        tabOverview.addEventListener("click", () => {
            currentView.tab = "overview";
            setActiveTab("overview");
            if (currentView.cachedDetail) {
                renderTabOverview(currentView.cachedDetail);
            }
        });

        tabYaml.addEventListener("click", () => {
            currentView.tab = "yaml";
            setActiveTab("yaml");
            if (currentView.target) {
                renderTabYaml(currentView.target, currentView.cachedDetail);
            }
        });

        function setActiveTab(tab) {
            tabItemOverview.classList.toggle("pf-m-current", tab === "overview");
            tabItemYaml.classList.toggle("pf-m-current", tab === "yaml");
        }

        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        // Returns text content or null on 404; throws on other errors.
        async function fetchText(url) {
            const res = await fetch(url);
            if (res.status === 404) return null;
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.text();
        }

        async function render() {
            try {
                if (currentView.name === "dashboard") {
                    pageTitle.textContent = "Overview";
                    tabs.style.display = "none";
                    await renderDashboard();
                } else {
                    pageTitle.innerHTML = `<span class="pf-v5-u-font-size-sm pf-v5-u-color-200" style="display:block">MirrorTarget</span> ${escapeHtml(currentView.target)}`;
                    tabs.style.display = "flex";
                    setActiveTab(currentView.tab || "overview");
                    await renderTargetDetail(currentView.target);
                }
            } catch (err) {
                app.innerHTML = `
                <div class="pf-v5-c-empty-state pf-m-lg">
                    <div class="pf-v5-c-empty-state__content">
                        <div class="pf-v5-c-empty-state__header">
                            <div class="pf-v5-c-empty-state__icon status-failed">
                                <i class="fas fa-exclamation-triangle" aria-hidden="true"></i>
                            </div>
                            <h1 class="pf-v5-c-title pf-m-lg">Error loading data</h1>
                        </div>
                        <div class="pf-v5-c-empty-state__body">
                            ${escapeHtml(err.message)}
                        </div>
                    </div>
                </div>`;
            }
            scheduleRefresh();
        }

        async function renderDashboard() {
            const targets = await fetchJSON("/api/v1/targets");
            if (!targets || targets.length === 0) {
                app.innerHTML = `
                <div class="pf-v5-c-empty-state pf-m-lg">
                    <div class="pf-v5-c-empty-state__content">
                        <div class="pf-v5-c-empty-state__header">
                            <div class="pf-v5-c-empty-state__icon">
                                <i class="fas fa-cubes" aria-hidden="true"></i>
                            </div>
                            <h1 class="pf-v5-c-title pf-m-lg">No MirrorTargets found</h1>
                        </div>
                        <div class="pf-v5-c-empty-state__body">
                            Create a MirrorTarget resource to get started mirroring images.
                        </div>
                    </div>
                </div>`;
                return;
            }

            let html = '<div class="pf-v5-l-grid pf-m-all-12-col-on-md pf-m-all-6-col-on-lg pf-m-all-4-col-on-xl pf-m-gutter">';
            for (const t of targets) {
                html += renderTargetCard(t);
            }
            html += '</div>';
            app.innerHTML = html;
        }

        function renderTargetCard(t) {
            const total = t.totalImages || 0;
            const mirrored = t.mirroredImages || 0;
            const pending = t.pendingImages || 0;
            const failed = t.failedImages || 0;
            const pm = total > 0 ? (mirrored / total * 100) : 0;

            let statusIcon = '<i class="fas fa-check-circle status-complete"></i>';
            if (failed > 0) statusIcon = '<i class="fas fa-exclamation-circle status-failed"></i>';
            else if (pending > 0) statusIcon = '<i class="fas fa-sync fa-spin status-mirroring"></i>';

            return `
            <div class="pf-v5-l-grid__item">
                <article class="pf-v5-c-card pf-m-clickable pf-m-selectable" onclick="location.hash='#/${escapeAttr(t.name)}'">
                    <div class="pf-v5-c-card__header">
                        <div class="pf-v5-c-card__header-main">
                            <h2 class="pf-v5-c-title pf-m-md">${statusIcon} ${escapeHtml(t.name)}</h2>
                            <div class="pf-v5-u-font-size-xs pf-v5-u-color-200 pf-v5-u-mt-xs">${escapeHtml(t.registry)}</div>
                        </div>
                    </div>
                    <div class="pf-v5-c-card__body">
                        <div class="pf-v5-l-flex pf-m-justify-content-space-between pf-v5-u-mb-xs">
                            <div class="pf-v5-u-font-size-sm">Progress</div>
                            <div class="pf-v5-u-font-size-sm">${Math.round(pm)}%</div>
                        </div>
                        <div class="progress-stepper">
                            <div class="progress-stepper-item complete" style="width:${pm}%"></div>
                            <div class="progress-stepper-item pending" style="width:${total > 0 ? (pending/total*100) : 0}%"></div>
                            <div class="progress-stepper-item failed" style="width:${total > 0 ? (failed/total*100) : 0}%"></div>
                        </div>
                        <div class="pf-v5-l-flex pf-m-space-items-lg pf-v5-u-mt-md">
                            <div><div class="pf-v5-u-font-size-xl pf-v5-u-font-weight-bold">${total}</div><div class="pf-v5-u-font-size-xs pf-v5-u-color-200">Total</div></div>
                            <div><div class="pf-v5-u-font-size-xl pf-v5-u-font-weight-bold status-complete">${mirrored}</div><div class="pf-v5-u-font-size-xs pf-v5-u-color-200">Mirrored</div></div>
                            <div><div class="pf-v5-u-font-size-xl pf-v5-u-font-weight-bold status-mirroring">${pending}</div><div class="pf-v5-u-font-size-xs pf-v5-u-color-200">Pending</div></div>
                            <div><div class="pf-v5-u-font-size-xl pf-v5-u-font-weight-bold status-failed">${failed}</div><div class="pf-v5-u-font-size-xs pf-v5-u-color-200">Failed</div></div>
                        </div>
                    </div>
                </article>
            </div>`;
        }

        async function renderTargetDetail(targetName) {
            const detail = await fetchJSON(`/api/v1/targets/${encodeURIComponent(targetName)}`);
            currentView.cachedDetail = detail;

            if ((currentView.tab || "overview") === "yaml") {
                renderTabYaml(targetName, detail);
            } else {
                renderTabOverview(detail);
            }
        }

        function renderTabOverview(detail) {
            const total = detail.totalImages || 0;
            const mirrored = detail.mirroredImages || 0;
            const pending = detail.pendingImages || 0;
            const failed = detail.failedImages || 0;
            const pm = total > 0 ? (mirrored / total * 100) : 0;

            let statusIcon = '<i class="fas fa-check-circle status-complete"></i> Healthy';
            if (failed > 0) statusIcon = '<i class="fas fa-exclamation-circle status-failed"></i> Degraded';
            else if (pending > 0) statusIcon = '<i class="fas fa-sync fa-spin status-mirroring"></i> Mirroring';

            let conditionsHtml = '';
            if (detail.conditions && detail.conditions.length > 0) {
                const rows = detail.conditions.map(c => {
                    const isTrue = c.status === "True";
                    const isFalse = c.status === "False";
                    const icon = isTrue
                        ? '<i class="fas fa-check-circle status-complete"></i>'
                        : isFalse
                            ? '<i class="fas fa-times-circle status-failed"></i>'
                            : '<i class="fas fa-minus-circle pf-v5-u-color-200"></i>';
                    return `
                    <div class="condition-row">
                        <div class="condition-row__icon">${icon}</div>
                        <div class="condition-row__body">
                            <div class="condition-row__title">${escapeHtml(c.type)} &middot; <span class="pf-v5-u-font-weight-normal">${escapeHtml(c.reason)}</span></div>
                            ${c.message ? `<div class="condition-row__sub">${escapeHtml(c.message)}</div>` : ''}
                        </div>
                    </div>`;
                }).join('');
                conditionsHtml = `
                    <section class="pf-v5-c-card pf-v5-u-mt-lg">
                        <div class="pf-v5-c-card__title">Conditions</div>
                        <div class="pf-v5-c-card__body">${rows}</div>
                    </section>`;
            }

            app.innerHTML = `
            <div class="overview-grid">
                <!-- Column Main -->
                <div class="overview-column-main">
                    <!-- Status Card -->
                    <section class="pf-v5-c-card pf-v5-u-mb-lg">
                        <div class="pf-v5-c-card__title">Status</div>
                        <div class="pf-v5-c-card__body">
                            <div class="pf-v5-l-flex pf-m-align-items-center pf-m-space-items-2xl">
                                <div>
                                    <div class="pf-v5-u-font-size-sm pf-v5-u-color-200 pf-v5-u-mb-xs">Overall Condition</div>
                                    <div class="pf-v5-u-font-size-lg pf-v5-u-font-weight-bold">${statusIcon}</div>
                                </div>
                                <div style="flex-grow: 1">
                                    <div class="pf-v5-u-font-size-sm pf-v5-u-color-200 pf-v5-u-mb-xs">Sync Progress (${Math.round(pm)}%)</div>
                                    <div class="progress-stepper">
                                        <div class="progress-stepper-item complete" style="width:${pm}%"></div>
                                        <div class="progress-stepper-item pending" style="width:${total > 0 ? (pending/total*100) : 0}%"></div>
                                        <div class="progress-stepper-item failed" style="width:${total > 0 ? (failed/total*100) : 0}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- ImageSets Table -->
                    <section class="pf-v5-c-card">
                        <div class="pf-v5-c-card__title">ImageSets</div>
                        <div class="pf-v5-c-card__body pf-m-no-fill">
                            <table class="pf-v5-c-table pf-m-grid-md" role="grid">
                                <thead>
                                    <tr role="row">
                                        <th role="columnheader" scope="col">Name</th>
                                        <th role="columnheader" scope="col">Status</th>
                                        <th role="columnheader" scope="col">Total</th>
                                        <th role="columnheader" scope="col">Mirrored</th>
                                        <th role="columnheader" scope="col">Pending</th>
                                        <th role="columnheader" scope="col">Failed</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${(detail.imageSets || []).map(is => {
                                        let badge = '<span class="pf-v5-u-font-size-sm status-complete"><i class="fas fa-check-circle"></i> Complete</span>';
                                        if (!is.found) badge = '<span class="pf-v5-u-font-size-sm status-failed"><i class="fas fa-minus-circle"></i> Missing</span>';
                                        else if (is.failed > 0) badge = `<span class="pf-v5-u-font-size-sm status-failed"><i class="fas fa-exclamation-circle"></i> ${is.failed} Failed</span>`;
                                        else if (is.pending > 0) badge = '<span class="pf-v5-u-font-size-sm status-mirroring"><i class="fas fa-sync fa-spin"></i> Mirroring</span>';

                                        return `
                                        <tr role="row">
                                            <td role="cell" data-label="Name"><strong>${escapeHtml(is.name)}</strong></td>
                                            <td role="cell" data-label="Status">${badge}</td>
                                            <td role="cell" data-label="Total">${is.total || 0}</td>
                                            <td role="cell" data-label="Mirrored" class="status-complete">${is.mirrored || 0}</td>
                                            <td role="cell" data-label="Pending" class="status-mirroring">${is.pending || 0}</td>
                                            <td role="cell" data-label="Failed" class="status-failed">${is.failed || 0}</td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <!-- Column Side -->
                <div class="overview-column-side">
                    <!-- Details Card -->
                    <section class="pf-v5-c-card pf-v5-u-mb-lg">
                        <div class="pf-v5-c-card__title">Details</div>
                        <div class="pf-v5-c-card__body">
                            <div class="pf-v5-u-mb-md">
                                <div class="pf-v5-u-font-size-xs pf-v5-u-color-200">Name</div>
                                <div class="pf-v5-u-font-size-sm">${escapeHtml(detail.name)}</div>
                            </div>
                            <div class="pf-v5-u-mb-md">
                                <div class="pf-v5-u-font-size-xs pf-v5-u-color-200">Registry</div>
                                <div class="pf-v5-u-font-size-sm">${escapeHtml(detail.registry)}</div>
                            </div>
                            <div class="pf-v5-u-mb-md">
                                <div class="pf-v5-u-font-size-xs pf-v5-u-color-200">Inventory</div>
                                <div class="pf-v5-u-font-size-sm">${(detail.imageSets || []).length} ImageSets</div>
                            </div>
                        </div>
                    </section>

                    <!-- Resources Card -->
                    <section class="pf-v5-c-card pf-v5-u-mb-lg">
                        <div class="pf-v5-c-card__title">Resources</div>
                        <div class="pf-v5-c-card__body">
                            ${(detail.resources && detail.resources.length > 0) ? `
                            <ul class="pf-v5-c-list pf-m-plain">
                                ${detail.resources.map(r => `
                                    <li class="pf-v5-u-mb-sm">
                                        <a href="${escapeAttr(r.url)}" class="pf-v5-c-button pf-m-link pf-m-inline pf-v5-u-font-size-sm" target="_blank">
                                            <i class="fas ${r.type === 'yaml' ? 'fa-file-code' : 'fa-copy'} pf-v5-u-mr-sm"></i>
                                            ${escapeHtml(r.name)}
                                        </a>
                                    </li>
                                `).join('')}
                            </ul>` : '<div class="pf-v5-u-font-size-sm pf-v5-u-color-200">No resources available yet.</div>'}
                        </div>
                    </section>

                    ${conditionsHtml}
                </div>
            </div>`;
        }

        async function renderTabYaml(targetName, detail) {
            app.innerHTML = `<div class="pf-v5-l-bullseye" style="min-height:200px">
                <div class="pf-v5-c-spinner" role="progressbar" aria-label="Loading YAML"></div>
            </div>`;

            // Collect YAML resource links from the detail
            const yamlResources = (detail && detail.resources || []).filter(r => r.type === "yaml");

            if (yamlResources.length === 0) {
                app.innerHTML = `
                <div class="pf-v5-c-empty-state pf-m-lg">
                    <div class="pf-v5-c-empty-state__content">
                        <div class="pf-v5-c-empty-state__header">
                            <div class="pf-v5-c-empty-state__icon pf-v5-u-color-200">
                                <i class="fas fa-file-code" aria-hidden="true"></i>
                            </div>
                            <h1 class="pf-v5-c-title pf-m-lg">No YAML resources available</h1>
                        </div>
                        <div class="pf-v5-c-empty-state__body">
                            IDMS, ITMS, and CatalogSource resources will appear here once mirroring has run.
                        </div>
                    </div>
                </div>`;
                return;
            }

            // Fetch all YAML resources in parallel; null means 404
            const contents = await Promise.all(yamlResources.map(r => fetchText(r.url)));

            let html = '';
            for (let i = 0; i < yamlResources.length; i++) {
                const r = yamlResources[i];
                const content = contents[i];
                if (content === null) continue;
                html += `
                <div class="yaml-resource-block">
                    <div class="yaml-resource-header">
                        <span><i class="fas fa-file-code pf-v5-u-mr-sm"></i>${escapeHtml(r.name)}</span>
                        <button class="pf-v5-c-button pf-m-plain pf-v5-u-font-size-sm" id="yaml-copy-${i}">
                            <i class="fas fa-copy pf-v5-u-mr-xs"></i> Copy
                        </button>
                    </div>
                    <pre class="yaml-resource-pre">${escapeHtml(content)}</pre>
                </div>`;
            }

            if (!html) {
                html = `<div class="pf-v5-u-font-size-sm pf-v5-u-color-200">Resources exist but returned no content.</div>`;
            }

            app.innerHTML = html;

            yamlResources.forEach((r, i) => {
                const content = contents[i];
                if (content === null) return;
                const btn = document.getElementById(`yaml-copy-${i}`);
                if (btn) btn.addEventListener("click", () => copyYaml(btn, content));
            });
        }

        function copyYaml(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = '<i class="fas fa-check pf-v5-u-mr-xs"></i> Copied';
                setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy pf-v5-u-mr-xs"></i> Copy'; }, 2000);
            });
        }

        function scheduleRefresh() {
            if (refreshTimer) clearTimeout(refreshTimer);
            refreshTimer = setTimeout(() => render(), REFRESH_INTERVAL);
        }

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = String(str || '');
            return div.innerHTML;
        }

        function escapeAttr(str) {
            return String(str || '').replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        currentView = parseHash();
        currentView.tab = "overview";
        render();
    })();
    </script>
</body>
</html>
